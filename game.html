<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ROULETTE 666</title>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: monospace; }
        body { background: #0a0202; color: #ff3333; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; overflow: hidden; user-select: none; }
        #game-panel { display: none; text-align: center; width: 100%; max-width: 400px; padding: 20px; }
        #ascii-eyes { font-size: 16px; line-height: 1.2; margin: 30px 0; white-space: pre; color: #ff3333; }
        .btn-panic { background: #220000; color: #ff0000; border: 2px solid #ff0000; width: 100%; padding: 20px; font-size: 16px; font-weight: bold; cursor: pointer; border-radius: 4px; touch-action: none; }
        .btn-panic:active { background: #ff0000; color: #000; }
        #status-msg { font-size: 18px; margin-bottom: 20px; height: 30px; letter-spacing: 1px; }
        #screamer { position: fixed; inset: 0; background: #000; color: #fff; display: none; flex-direction: column; justify-content: center; align-items: center; font-size: 6px; line-height: 5px; z-index: 10000; }
        .flash-red { animation: flash 0.2s infinite; }
        @keyframes flash { 0%, 100% { background: #0a0202; } 50% { background: #400000; } }
    </style>
</head>
<body>

<div id="login-screen" style="position:fixed; inset:0; background:#000; display:flex; flex-direction:column; justify-content:center; align-items:center; z-index:999;">
    <h2 style="color:#ff3333; margin-bottom:20px; letter-spacing:3px;">ROULETTE 666</h2>
    <input type="text" id="nick" placeholder="Seu Nome" style="background:#000; border:1px solid #444; color:#fff; padding:10px; margin-bottom:10px; outline:none; text-align:center;">
    <input type="text" id="sala" placeholder="Código da Sala" style="background:#000; border:1px solid #444; color:#fff; padding:10px; margin-bottom:20px; outline:none; text-align:center;">
    <button class="btn-panic" style="padding:10px 20px; font-size:12px; width:auto;" onclick="conectar()">INICIAR TESTE</button>
</div>

<div id="game-panel">
    <div id="status-msg">SISTEMA ESTÁVEL... POR ENQUANTO</div>
    <div id="folego-display">FÔLEGO: 100%</div>
    <div id="ascii-eyes">
   👁️       👁️
 (  •  )   (  •  )
    </div>
    <button class="btn-panic" id="panic-btn">FECHAR OLHOS (SEGURE)</button>
</div>

<div id="screamer">
    <pre>
   ▄██████████████▄
  ██▒▒▒▒▒▒▒▒▒▒▒▒▒▒██
 ██▒▒  🕱      🕱  ▒▒██
██▒▒▒      ██      ▒▒██
██▒▒▒▒    ████    ▒▒▒██
 ██▒▒▒▒▒   ██   ▒▒▒▒██
  ██▒▒▒▒▒▒▒▒▒▒▒▒▒▒██
   ▀██████████████▀
     M O R T O
    </pre>
</div>

<script>
    let mqttClient, baseTopic, myName;
    let olhosFechados = false, folego = 100, monstroPresente = false, morto = false;
    let folegoInterval;

    function conectar() {
        myName = document.getElementById('nick').value.trim();
        let sala = document.getElementById('sala').value.trim().toLowerCase();
        if(!myName || !sala) return;
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('game-panel').style.display = 'block';

        baseTopic = "roulette_666_2026/" + sala;
        mqttClient = mqtt.connect('wss://broker.hivemq.com:8884/mqtt');

        mqttClient.on('connect', () => {
            mqttClient.subscribe(baseTopic + "/ataque");
            
            // Configura os eventos de segurar o botão (Desktop e Mobile)
            const btn = document.getElementById('panic-btn');
            btn.addEventListener('mousedown', fecharOlhos);
            btn.addEventListener('mouseup', abrirOlhos);
            btn.addEventListener('touchstart', (e) => { e.preventDefault(); fecharOlhos(); });
            btn.addEventListener('touchend', (e) => { e.preventDefault(); abrirOlhos(); });

            // Ciclo do Monstro controlado pelo primeiro que entrar
            setInterval(loopDoPredador, 7000);
            folegoInterval = setInterval(gerenciarFolego, 100);
        });

        mqttClient.on('message', (topic, msg) => {
            let data = JSON.parse(msg.toString());
            if(topic === baseTopic + "/ataque") {
                if(data.tipo === "ALERTA") {
                    monstroPresente = true;
                    document.body.className = "flash-red";
                    document.getElementById('status-msg').innerText = "⚠️ [NÃO OLHE! ALGO ENTROU]";
                } else if(data.tipo === "FIM") {
                    monstroPresente = false;
                    document.body.className = "";
                    document.getElementById('status-msg').innerText = "ESCAPOU... ELE SE FOI";
                }
            }
        });
    }

    function fecharOlhos() {
        if(morto) return;
        olhosFechados = true;
        document.getElementById('ascii-eyes').innerText = "\n   ▆▆▆▆       ▆▆▆▆   \n";
        document.getElementById('ascii-eyes').style.color = "#333";
    }

    function abrirOlhos() {
        if(morto) return;
        olhosFechados = false;
        document.getElementById('ascii-eyes').innerText = "   👁️       👁️\n (  •  )   (  •  )";
        document.getElementById('ascii-eyes').style.color = "#ff3333";
        
        // Se abrir o olho com o monstro na sala: JUMPSCARE
        if(monstroPresente) final Fatal();
    }

    function gerenciarFolego() {
        if(!gameActive() || morto) return;
        let display = document.getElementById('folego-display');

        if(olhosFechados) {
            folego = Math.max(0, folego - 2.5); // Gasta fôlego ao fechar o olho/prender a respiração
            if(folego <= 0) {
                abrirOlhos(); // Abre o olho a força por falta de ar
            }
        } else {
            folego = Math.min(100, folego + 4); // Recupera ar com olho aberto
        }
        display.innerText = `FÔLEGO: ${Math.floor(folego)}%`;
    }

    function loopDoPredador() {
        if(morto) return;
        // Sincroniza o ataque para todos na sala simultaneamente
        if(Math.random() > 0.5 && !monstroPresente) {
            mqttClient.publish(baseTopic + "/ataque", JSON.stringify({tipo: "ALERTA"}));
            
            // O monstro vai embora após um tempo aleatório (entre 2.5 e 4.5 segundos)
            setTimeout(() => {
                mqttClient.publish(baseTopic + "/ataque", JSON.stringify({tipo: "FIM"}));
            }, 2500 + Math.random() * 2000);
        }
    }

    function finalFatal() {
        morto = true;
        clearInterval(folegoInterval);
        let sc = document.getElementById('screamer');
        sc.style.display = 'flex';
        
        // Efeito de flash estroboscópico na morte
        let count = 0;
        let int = setInterval(() => {
            sc.style.background = sc.style.background === 'rgb(0, 0, 0)' ? '#ff0000' : '#000';
            if(count++ > 25) { clearInterval(int); sc.style.background = '#000'; }
        }, 40);
    }

    function gameActive() { return mqttClient != null; }
</script>
</body>
</html>
