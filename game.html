<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>O Vazio do Asilo - Versão Corrigida</title>
    <style>
        /* RESET E ESTILOS GERAIS */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000000;
            font-family: 'Courier New', Courier, monospace;
            color: #dcdcdc;
        }

        /* TELA INICIAL */
        #tela-inicial {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, #1a0505 0%, #000000 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            transition: opacity 1s ease;
            padding: 20px;
        }

        #tela-inicial h1 {
            font-size: 2.5rem;
            color: #8b0000;
            text-shadow: 0 0 10px rgba(139, 0, 0, 0.8);
            margin-bottom: 20px;
            text-align: center;
            animation: pulsar 3s infinite alternate;
        }

        #tela-inicial p {
            font-size: 0.9rem;
            margin-bottom: 40px;
            color: #777;
            text-align: center;
            max-width: 500px;
            line-height: 1.5;
        }

        .btn {
            padding: 15px 40px;
            background: transparent;
            border: 2px solid #8b0000;
            color: #8b0000;
            font-size: 1.1rem;
            font-family: inherit;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 0 5px rgba(139, 0, 0, 0.4);
            -webkit-tap-highlight-color: transparent;
        }

        .btn:hover, .btn:active {
            background: #8b0000;
            color: #000;
            box-shadow: 0 0 20px #8b0000;
        }

        /* CENÁRIO DO JOGO */
        #cenario {
            position: relative;
            width: 100%;
            height: 100%;
            display: none;
            background-image: url('https://picsum.photos/id/1016/1920/1080'); /* Imagem de segurança caso local falhe */
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        /* EFEITO DE LANTERNA (VINETE SEGUIDORA) */
        #lanterna {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background: radial-gradient(circle 120px at 50% 50%, transparent 100%, rgba(0,0,0,0.98) 100%);
            z-index: 5;
        }

        /* BARRA DE STATUS / SANIDADE */
        #interface {
            position: absolute;
            top: 15px;
            left: 15px;
            right: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 6;
            pointer-events: none;
        }

        .status-container {
            pointer-events: auto;
            background: rgba(0, 0, 0, 0.8);
            padding: 8px 15px;
            border: 1px solid #333;
        }

        .status-container label {
            font-size: 0.8rem;
            display: block;
        }

        .barra-sanidade {
            width: 120px;
            height: 12px;
            border: 1px solid #555;
            background-color: #222;
            margin-top: 5px;
            overflow: hidden;
        }

        #progresso-sanidade {
            width: 100%;
            height: 100%;
            background-color: #8b0000;
            transition: width 0.3s ease;
        }

        #inventario {
            pointer-events: auto;
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid #333;
            padding: 8px 15px;
            font-size: 0.8rem;
        }

        /* CAIXA DE TEXTO */
        #caixa-texto {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            background: rgba(5, 5, 5, 0.95);
            border: 1px solid #8b0000;
            padding: 15px;
            z-index: 6;
            min-height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-size: 0.95rem;
            text-shadow: 1px 1px 2px #000;
            box-shadow: 0 0 15px rgba(0,0,0,0.8);
        }

        /* OBJETOS INTERATIVOS */
        .objeto {
            position: absolute;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            filter: brightness(0.15); /* Deixei um pouco mais claro para você conseguir ver os contornos */
            transition: transform 0.2s ease, filter 0.1s ease;
        }

        /* Área da porta invisível no meio do cenário */
        #porta {
            bottom: 22%;
            left: 40%;
            width: 20%;
            height: 55%;
            background: transparent;
            filter: none;
        }

        /* Quadro Bizarro */
        #quadro {
            top: 25%;
            left: 8%;
            width: 90px;
            height: 120px;
            background-image: url('https://picsum.photos/id/1025/300/400'); /* Fallback online */
            border: 2px solid #2a2015;
        }

        /* Armário Médico */
        #armario {
            bottom: 15%;
            right: 8%;
            width: 110px;
            height: 200px;
            background-image: url('https://picsum.photos/id/1043/400/600'); /* Fallback online */
        }

        /* Bilhete no chão */
        #bilhete {
            bottom: 18%;
            left: 32%;
            width: 35px;
            height: 35px;
            background-color: #eee;
            border: 1px solid #ccc;
            transform: rotate(-20deg);
        }

        .tremendo {
            animation: tremer 0.2s infinite;
        }

        /* TELAS FINAIS */
        .tela-fim {
            position: absolute;
            width: 100%;
            height: 100%;
            background: #000;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 20;
            padding: 20px;
            text-align: center;
        }

        #game-over h2 {
            color: #ff0000;
            font-size: 2.5rem;
            margin-bottom: 20px;
            letter-spacing: 3px;
            animation: tremer 0.1s infinite;
        }

        #vitoria h2 {
            color: #00ff00;
            font-size: 2.5rem;
            margin-bottom: 20px;
        }

        /* ANIMAÇÕES */
        @keyframes pulsar {
            0% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        @keyframes tremer {
            0% { transform: translate(2px, 1px) rotate(0deg); }
            50% { transform: translate(-1px, -1px) rotate(1deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }

        /* JUMPSCARE */
        #jumpscare {
            position: absolute;
            width: 100%;
            height: 100%;
            background-color: #300;
            background-image: url('https://picsum.photos/id/1074/1920/1080');
            background-size: cover;
            background-position: center;
            z-index: 30;
            display: none;
            animation: tremer 0.05s infinite;
        }
    </style>
</head>
<body>

    <div id="tela-inicial">
        <h1>O VAZIO DO ASILO</h1>
        <p>A escuridão se move. Mexa o cursor ou o dedo para guiar a lanterna e clique nos objetos das paredes para achar a saída.</p>
        <button class="btn" onclick="iniciarJogo()">ENTRAR NAS SOMBRAS</button>
    </div>

    <div id="cenario">
        <div id="lanterna"></div>

        <div id="interface">
            <div class="status-container">
                <label>SANIDADE</label>
                <div class="barra-sanidade">
                    <div id="progresso-sanidade"></div>
                </div>
            </div>
            <div id="inventario">Inventário: Vazio</div>
        </div>

        <div id="porta" class="objeto" onclick="interagir('porta')"></div>
        <div id="quadro" class="objeto" onclick="interagir('quadro')"></div>
        <div id="armario" class="objeto" onclick="interagir('armario')"></div>
        <div id="bilhete" class="objeto" onclick="interagir('bilhete')"></div>

        <div id="caixa-texto">Mova a lanterna para revelar as coisas escondidas...</div>
    </div>

    <div id="jumpscare"></div>

    <div id="game-over" class="tela-fim">
        <h2>SUA MENTE QUEBROU</h2>
        <button class="btn" onclick="reiniciarJogo()">REINICIAR</button>
    </div>

    <div id="vitoria" class="tela-fim">
        <h2>VOCÊ SOBREVIVEU</h2>
        <button class="btn" onclick="reiniciarJogo()">JOGAR NOVAMENTE</button>
    </div>

    <script>
        let estado = {
            sanidade: 100,
            temChave: false,
            quadroObservado: false,
            armarioAberto: false,
            fimDoJogo: false,
            intervaloSanidade: null,
            lanternaX: 0,
            lanternaY: 0
        };

        const caixaTexto = document.getElementById('caixa-texto');
        const progressoSanidade = document.getElementById('progresso-sanidade');
        const inventarioDiv = document.getElementById('inventario');
        const lanterna = document.getElementById('lanterna');
        const cenario = document.getElementById('cenario');

        // Tentativa de carregar imagens locais. Se falharem, mantemos as da internet!
        function injetarImagensLocais() {
            const imgFundo = new Image();
            imgFundo.src = 'image_0.png';
            imgFundo.onload = () => cenario.style.backgroundImage = "url('image_0.png')";

            const imgQuadro = new Image();
            imgQuadro.src = 'image_1.png';
            imgQuadro.onload = () => document.getElementById('quadro').style.backgroundImage = "url('image_1.png')";

            const imgArmario = new Image();
            imgArmario.src = 'image_2.png';
            imgArmario.onload = () => document.getElementById('armario').style.backgroundImage = "url('image_2.png')";

            const imgSusto = new Image();
            imgSusto.src = 'image_3.png';
            imgSusto.onload = () => document.getElementById('jumpscare').style.backgroundImage = "url('image_3.png')";
        }

        let audioCtx = null;
        function iniciarAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        function tocarSomTerror(frequencia, tipo, duracao, volume) {
            if (!audioCtx) return;
            try {
                let osc = audioCtx.createOscillator();
                let gain = audioCtx.createGain();
                osc.type = tipo;
                osc.frequency.setValueAtTime(frequencia, audioCtx.currentTime);
                if (tipo === 'sawtooth' || frequencia < 150) {
                    osc.frequency.linearRampToValueAtTime(frequencia - 30, audioCtx.currentTime + duracao);
                }
                gain.gain.setValueAtTime(volume, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + duracao);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + duracao);
            } catch (e) {}
        }

        function iniciarJogo() {
            iniciarAudio();
            injetarImagensLocais();
            document.getElementById('tela-inicial').style.display = 'none';
            cenario.style.display = 'block';
            
            tocarSomTerror(55, 'sine', 4, 0.4);
            setInterval(() => {
                if (!estado.fimDoJogo) {
                    tocarSomTerror(50 + Math.random() * 15, 'sine', 3, 0.25);
                }
            }, 3200);

            estado.intervaloSanidade = setInterval(() => {
                if (!estado.fimDoJogo) {
                    atualizarSanidade(-1.5);
                }
            }, 1000);
        }

        function gerenciarIluminacaoObjetos() {
            const objetos = document.querySelectorAll('.objeto');
            objetos.forEach(obj => {
                if (obj.id === 'porta') return;
                const rect = obj.getBoundingClientRect();
                const objX = rect.left + (rect.width / 2);
                const objY = rect.top + (rect.height / 2);
                const distancia = Math.hypot(estado.lanternaX - objX, estado.lanternaY - objY);
                
                if (distancia < 140) {
                    const intensidade = 1 - (distancia / 140);
                    obj.style.filter = `brightness(${0.15 + (intensidade * 0.85)})`;
                } else {
                    obj.style.filter = 'brightness(0.15)';
                }
            });
        }

        function atualizarLanterna(x, y) {
            estado.lanternaX = x;
            estado.lanternaY = y;
            lanterna.style.background = `radial-gradient(circle 120px at ${x}px ${y}px, transparent 100%, rgba(0,0,0,0.98) 100%)`;
            gerenciarIluminacaoObjetos();
        }

        window.addEventListener('mousemove', (e) => {
            if (cenario.style.display === 'block') atualizarLanterna(e.clientX, e.clientY);
        });

        window.addEventListener('touchmove', (e) => {
            if (cenario.style.display === 'block' && e.touches.length > 0) {
                atualizarLanterna(e.touches[0].clientX, e.touches[0].clientY);
            }
        });

        function atualizarSanidade(valor) {
            estado.sanidade += valor;
            if (estado.sanidade > 100) estado.sanidade = 100;
            if (estado.sanidade <= 0) {
                estado.sanidade = 0;
                desencadearGameOver();
            }
            progressoSanidade.style.width = estado.sanidade + '%';
        }

        function interagir(objetoId) {
            if (estado.fimDoJogo) return;

            if (objetoId === 'porta') {
                if (estado.temChave) {
                    tocarSomTerror(350, 'triangle', 0.8, 0.4);
                    vencerJogo();
                } else {
                    tocarSomTerror(110, 'square', 0.2, 0.5);
                    caixaTexto.innerText = "A porta está trancada por correntes pesadas. Preciso da chave da ala.";
                }
            } 
            else if (objetoId === 'quadro') {
                tocarSomTerror(200, 'sine', 0.6, 0.4);
                caixaTexto.innerText = "Um quadro perturbador. Atrás dele há algo cravado: 'Procure onde os velhos panos cobrem o metal ferido'.";
                estado.quadroObservado = true;
                atualizarSanidade(-5);
            } 
            else if (objetoId === 'armario') {
                const domArmario = document.getElementById('armario');
                if (!estado.quadroObservado) {
                    tocarSomTerror(90, 'square', 0.3, 0.4);
                    domArmario.classList.add('tremendo');
                    setTimeout(() => domArmario.classList.remove('tremendo'), 200);
                    caixaTexto.innerText = "O armário de metal cirúrgico está completamente bloqueado pela ferrugem.";
                } else if (!estado.armarioAberto) {
                    tocarSomTerror(160, 'sawtooth', 0.8, 0.5);
                    caixaTexto.innerText = "Você rasga os panos velhos guardados ali dentro... Achou a Chave da Ala!";
                    estado.armarioAberto = true;
                    estado.temChave = true;
                    inventarioDiv.innerText = "Inventário: Chave da Ala";
                    inventarioDiv.style.color = "#00ff00";
                } else {
                    caixaTexto.innerText = "Não tem mais nada aqui.";
                }
            } 
            else if (objetoId === 'bilhete') {
                tocarSomTerror(450, 'sine', 0.3, 0.3);
                caixaTexto.innerText = "Um bilhete rasgado: 'O tempo está acabando. Não o deixe te encontrar no escuro.'";
            }
        }

        function desencadearGameOver() {
            estado.fimDoJogo = true;
            clearInterval(estado.intervaloSanidade);
            const jumpscareDiv = document.getElementById('jumpscare');
            jumpscareDiv.style.display = 'block';
            tocarSomTerror(790, 'sawtooth', 1.2, 1.0);
            setTimeout(() => {
                jumpscareDiv.style.display = 'none';
                document.getElementById('game-over').style.display = 'flex';
                cenario.style.display = 'none';
            }, 1200);
        }

        function vencerJogo() {
            estado.fimDoJogo = true;
            clearInterval(estado.intervaloSanidade);
            document.getElementById('vitoria').style.display = 'flex';
            cenario.style.display = 'none';
        }

        function reiniciarJogo() {
            estado.sanidade = 100;
            estado.temChave = false;
            estado.quadroObservado = false;
            estado.armarioAberto = false;
            estado.fimDoJogo = false;
            inventarioDiv.innerText = "Inventário: Vazio";
            inventarioDiv.style.color = "#dcdcdc";
            document.getElementById('game-over').style.display = 'none';
            document.getElementById('vitoria').style.display = 'none';
            iniciarJogo();
        }
    </script>
</body>
</html>
