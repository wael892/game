<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gartic Clone com Videochamada Realtime</title>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #ffd43b;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            padding: 20px;
        }

        /* Tela de Login */
        #login-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #ffd43b;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .login-box {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .login-box h2 {
            color: #118ab2;
            margin-bottom: 20px;
        }

        .login-box input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 2px solid #ced4da;
            border-radius: 8px;
            outline: none;
            font-size: 16px;
        }

        .login-box input:focus {
            border-color: #118ab2;
        }

        /* Estrutura Principal */
        header {
            text-align: center;
            margin-bottom: 15px;
            background: white;
            padding: 10px 30px;
            border-radius: 50px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 1200px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 {
            color: #118ab2;
            font-size: 24px;
        }

        #room-display {
            font-weight: bold;
            color: #666;
            font-size: 14px;
        }

        #main-container {
            display: flex;
            width: 100%;
            max-width: 1200px;
            height: 75vh;
            gap: 20px;
        }

        /* Painel de Câmeras e Conectados */
        #scoreboard {
            flex: 1.2;
            background: white;
            border-radius: 15px;
            padding: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
            gap: 10px;
            margin-top: 10px;
            overflow-y: auto;
            flex: 1;
        }

        .video-container {
            position: relative;
            background: #222;
            border-radius: 8px;
            overflow: hidden;
            aspect-ratio: 4/3;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .video-label {
            position: absolute;
            bottom: 5px;
            left: 5px;
            background: rgba(0, 0, 0, 0.6);
            color: white;
            padding: 2px 6px;
            font-size: 11px;
            border-radius: 4px;
            font-weight: bold;
        }

        /* Painel de Desenho */
        #canvas-container {
            flex: 3;
            background: white;
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        canvas {
            flex: 1;
            background: #ffffff;
            cursor: crosshair;
        }

        #tools {
            height: 60px;
            background: #e9ecef;
            display: flex;
            align-items: center;
            padding: 0 15px;
            gap: 15px;
            border-top: 2px solid #dee2e6;
        }

        .color-circle {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
        }

        .color-circle.active {
            border-color: #000;
        }

        .btn {
            padding: 8px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-clear { background: #ef476f; color: white; }
        .btn-draw { background: #06d6a0; color: white; }

        /* Painel do Chat */
        #chat-container {
            flex: 1.5;
            background: white;
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #chat-messages {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .msg {
            padding: 6px 10px;
            border-radius: 5px;
            font-size: 14px;
            word-break: break-all;
        }

        .msg-system { background: #e2f0d9; color: #385723; font-weight: bold; }
        .msg-normal { background: #f1f3f5; color: #333; }
        .msg-normal .username { font-weight: bold; color: #118ab2; }

        #chat-input-area {
            display: flex;
            padding: 10px;
            border-top: 2px solid #dee2e6;
            background: #f8f9fa;
        }

        #chat-input {
            flex: 1;
            padding: 10px;
            border: 2px solid #ced4da;
            border-radius: 5px;
            outline: none;
        }

        #btn-send {
            background: #118ab2;
            color: white;
            margin-left: 8px;
        }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h2>Gartic + Videochamada</h2>
            <input type="text" id="input-username" placeholder="Seu Nome / Apelido" required>
            <input type="text" id="input-room" placeholder="Nome da Sala (ex: sala123)" required>
            <button class="btn btn-draw" style="width: 100%; padding: 12px; font-size: 16px;" onclick="connectToGame()">ENTRAR COM CÂMERA</button>
        </div>
    </div>

    <header>
        <h1>GARTIC VIDEO REALTIME</h1>
        <div id="room-display">Sala: Não conectado</div>
    </header>

    <div id="main-container">
        <div id="scoreboard">
            <h3 style="color: #555; padding-bottom: 5px; border-bottom: 2px solid #f1f3f5;">Participantes:</h3>
            <div id="video-grid"></div>
        </div>

        <div id="canvas-container">
            <canvas id="canvas"></canvas>
            <div id="tools">
                <div class="color-circle active" style="background: #000000;" onclick="changeColor('#000000', this)"></div>
                <div class="color-circle" style="background: #ef476f;" onclick="changeColor('#ef476f', this)"></div>
                <div class="color-circle" style="background: #ffd166;" onclick="changeColor('#ffd166', this)"></div>
                <div class="color-circle" style="background: #06d6a0;" onclick="changeColor('#06d6a0', this)"></div>
                <div class="color-circle" style="background: #118ab2;" onclick="changeColor('#118ab2', this)"></div>
                <button class="btn btn-clear" onclick="sendClear()">Limpar Tudo</button>
                <button class="btn btn-draw" id="btn-role" onclick="toggleRole()" style="margin-left: auto;">Modo: Adivinhador</button>
            </div>
        </div>

        <div id="chat-container">
            <div id="chat-messages"></div>
            <div id="chat-input-area">
                <input type="text" id="chat-input" placeholder="Digite uma mensagem ou palpite..." autocomplete="off">
                <button id="btn-send" class="btn" onclick="sendChatMessage()">Enviar</button>
            </div>
        </div>
    </div>

    <script>
        let username = "";
        let roomName = "";
        let mqttClient = null;
        let baseTopic = "";
        
        // Variáveis do Sistema de Vídeo WebRTC
        let myPeer = null;
        let myPeerId = "";
        let localStream = null;
        const peersConectados = {};

        // Controle de Desenho
        let isDrawer = false;
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let drawing = false;
        let currentColor = '#000000';

        function resizeCanvas() {
            canvas.width = canvas.clientWidth;
            canvas.height = canvas.clientHeight;
            ctx.lineCap = 'round';
            ctx.lineWidth = 4;
        }

        // Eventos de Input na Lousa
        canvas.addEventListener('mousedown', (e) => startDrawing(e.clientX, e.clientY));
        canvas.addEventListener('mousemove', (e) => draw(e.clientX, e.clientY));
        canvas.addEventListener('mouseup', stopDrawing);
        canvas.addEventListener('mouseout', stopDrawing);

        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); startDrawing(e.touches[0].clientX, e.touches[0].clientY); });
        canvas.addEventListener('touchmove', (e) => { e.preventDefault(); draw(e.touches[0].clientX, e.touches[0].clientY); });
        canvas.addEventListener('touchend', stopDrawing);

        function startDrawing(clientX, clientY) {
            if (!isDrawer) return;
            drawing = true;
            const rect = canvas.getBoundingClientRect();
            const x = clientX - rect.left;
            const y = clientY - rect.top;
            ctx.beginPath();
            ctx.moveTo(x, y);
            sendDrawData('start', x, y, currentColor);
        }

        function draw(clientX, clientY) {
            if (!drawing || !isDrawer) return;
            const rect = canvas.getBoundingClientRect();
            const x = clientX - rect.left;
            const y = clientY - rect.top;
            ctx.strokeStyle = currentColor;
            ctx.lineTo(x, y);
            ctx.stroke();
            sendDrawData('draw', x, y, currentColor);
        }

        function stopDrawing() {
            if (!isDrawer) return;
            drawing = false;
            sendDrawData('stop', 0, 0, currentColor);
        }

        function changeColor(color, element) {
            currentColor = color;
            document.querySelectorAll('.color-circle').forEach(el => el.classList.remove('active'));
            element.classList.add('active');
        }

        function toggleRole() {
            isDrawer = !isDrawer;
            const btn = document.getElementById('btn-role');
            if (isDrawer) {
                btn.innerText = "Modo: Desenhista";
                btn.style.background = "#ef476f";
                addSystemMessage("Você assumiu a lousa! Comece a desenhar.");
            } else {
                btn.innerText = "Modo: Adivinhador";
                btn.style.background = "#06d6a0";
                drawing = false;
            }
        }

        // Inicializa o fluxo de áudio e vídeo e se conecta na rede
        function connectToGame() {
            username = document.getElementById('input-username').value.trim();
            roomName = document.getElementById('input-room').value.trim().toLowerCase().replace(/[^a-z0-9]/g, "");

            if (!username || !roomName) {
                alert("Por favor, digite seu nome e o nome da sala!");
                return;
            }

            // Pede permissão para acessar Câmera e Microfone do computador/celular
            navigator.mediaDevices.getUserMedia({
                video: true,
                audio: true
            }).then(stream => {
                localStream = stream;
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('room-display').innerText = "Sala: " + roomName;
                resizeCanvas();

                // Adiciona o seu próprio vídeo quadrado no painel esquerdo
                addVideoStream(localStream, username, true);

                // Inicializa o servidor de sinalização WebRTC para as conexões de vídeo
                initPeerServer();
            }).catch(err => {
                alert("Erro ao acessar câmera/microfone. Ative as permissões para jogar com vídeo!");
                console.error(err);
            });
        }

        function initPeerServer() {
            // Cria um identificador único de chamada p2p baseado na sala para não cruzar dados
            myPeer = new Peer(undefined, {
                host: '0.peerjs.com',
                port: 443,
                secure: true
            });

            myPeer.on('open', id => {
                myPeerId = id;
                // Depois de gerar a sua linha telefônica virtual, conecta ao servidor de mensagens do Gartic
                initMqtt();
            });

            // Escuta quando algum outro jogador ligar para a sua câmera
            myPeer.on('call', call => {
                // Atende a chamada enviando o seu fluxo de vídeo de volta
                call.answer(localStream);
                
                // Recebe o sinal de vídeo da outra pessoa e coloca na tela
                const remoteVideo = document.createElement('video');
                call.on('stream', userVideoStream => {
                    // O nome será capturado e atualizado via sincronismo de rede
                    addVideoStream(userVideoStream, call.metadata?.user || "Jogador", false, call.peer);
                });
            });
        }

        function initMqtt() {
            baseTopic = "gartic_clone_free_2026/" + roomName;
            
            // Conecta ao servidor estável e aberto da Eclipse Foundation
            mqttClient = mqtt.connect('wss://iot.eclipseorg.co:443/ws');

            mqttClient.on('connect', () => {
                mqttClient.subscribe(baseTopic + "/chat");
                mqttClient.subscribe(baseTopic + "/draw");
                mqttClient.subscribe(baseTopic + "/presence");

                // Envia para a rede o seu apelido e o ID da sua câmera para que os outros te liguem
                const identityPayload = JSON.stringify({ sender: "Sistema", text: `${username} entrou na sala.`, peerId: myPeerId, name: username });
                mqttClient.publish(baseTopic + "/chat", identityPayload);
                mqttClient.publish(baseTopic + "/presence", identityPayload);
            });

            mqttClient.on('message', (topic, message) => {
                const data = JSON.parse(message.toString());

                if (topic === baseTopic + "/chat") {
                    if (data.sender === "Sistema") {
                        addSystemMessage(data.text);
                    } else {
                        renderNormalMessage(data.sender, data.text);
                    }
                } else if (topic === baseTopic + "/draw" && !isDrawer) {
                    renderRemoteDraw(data);
                } else if (topic === baseTopic
