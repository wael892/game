<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complete a Palavra - Ultra Óbvio</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0d0714;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 15px;
        }

        .game-container {
            background-color: #150d22;
            border-radius: 10px;
            padding: 20px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 5px 25px rgba(0,0,0,0.7);
            border: 2px solid #ff007f;
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 5px;
            color: #ff007f;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .subtitle {
            color: #aaa;
            font-size: 0.85rem;
            margin-bottom: 20px;
        }

        .status-container {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            font-size: 0.85rem;
            color: #00ffaa;
            font-weight: bold;
        }

        .hint-box {
            background-color: #221435;
            padding: 12px;
            border-radius: 6px;
            font-size: 0.95rem;
            margin-bottom: 25px;
            border-left: 4px solid #00ffaa;
            text-align: left;
            line-height: 1.4;
        }

        .word-display {
            display: flex;
            justify-content: center;
            gap: 6px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .letter-box {
            width: 34px;
            height: 42px;
            border-bottom: 3px solid #ff007f;
            font-size: 1.5rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            text-transform: uppercase;
        }

        .letter-box.fixed {
            border-bottom: 3px solid #444;
            color: #fff;
        }

        .letter-box input {
            width: 100%;
            height: 100%;
            background: transparent;
            border: none;
            text-align: center;
            font-size: 1.5rem;
            font-weight: bold;
            color: #00ffaa;
            text-transform: uppercase;
            outline: none;
        }

        .btn {
            background-color: #ff007f;
            color: white;
            border: none;
            padding: 12px;
            font-size: 1rem;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            text-transform: uppercase;
            transition: background 0.2s;
        }

        .btn:hover {
            background-color: #ff3399;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.95);
            align-items: center;
            justify-content: center;
            z-index: 10;
            padding: 20px;
        }

        .modal-content {
            background: #150d22;
            padding: 30px 20px;
            border-radius: 10px;
            text-align: center;
            max-width: 360px;
            width: 100%;
            border: 3px solid #00ffaa;
        }

        .modal-content.gameover {
            border-color: #ff007f;
        }

        .modal-content h2 {
            font-size: 1.6rem;
            margin-bottom: 10px;
        }

        .modal-content p {
            font-size: 0.95rem;
            margin-bottom: 20px;
            color: #ccc;
            line-height: 1.4;
        }

        .icon {
            font-size: 3.5rem;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <div class="game-container">
        <h1>Mente Poluída</h1>
        <div class="subtitle">Complete a lacuna... Pense antes de digitar!</div>
        
        <div class="status-container">
            <span id="levelDisplay">Fase: 1/3</span>
            <span id="livesDisplay">Vidas: ❤️ ❤️ ❤️</span>
        </div>

        <div class="hint-box" id="hintText">
            Dica: ...
        </div>

        <div class="word-display" id="wordDisplay"></div>

        <button class="btn" onclick="verifyWord()">Enviar Resposta</button>
    </div>

    <div id="winModal" class="modal">
        <div class="modal-content">
            <div class="icon">😇🏆</div>
            <h2 style="color: #00ffaa;">Inocente Demais!</h2>
            <p>Você superou o teste de mente poluída mais óbvio do mundo e manteve o foco na resposta certa!</p>
            <button class="btn" style="background-color: #00ffaa; color: #000;" onclick="restartGame()">Jogar de Novo</button>
        </div>
    </div>

    <div id="loseModal" class="modal">
        <div class="modal-content gameover">
            <div class="icon">😈❌</div>
            <h2 style="color: #ff007f;">Pego no Flagra!</h2>
            <p id="loseReason">Mente totalmente poluída detectada!</p>
            <button class="btn" onclick="restartGame()">Limpar a Mente e Tentar de Novo</button>
        </div>
    </div>

    <script>
        const levels = [
            {
                hint: "Embalagem ou caixa de papelão, madeira ou plástico usada para guardar ou transportar mercadorias.",
                // Fica visível na tela: B O C E T A -> O jogador só digita o 'O' para formar B O C E T E
                displayPattern: ['B', '_', 'C', 'E', 'T', 'E'], 
                correctWord: "BOCETE",
                scold: "Pensou naquilo com 'A' no final, né? Mas a resposta certa é BOCETE (termo antigo para caixa pequena de guardar joias/rapé)!"
            },
            {
                hint: "Peixe de água doce muito comum no Brasil, famoso por ter o corpo coberto de listras pretas.",
                // Fica visível na tela: P I C A -> O jogador só digita o 'R' para formar P I C A R E
                displayPattern: ['P', 'I', 'C', 'A', 'R', '_'],
                correctWord: "PICARU",
                scold: "Parou na quarta letra e sorriu, né? O peixe correto é o PICARU!"
            },
            {
                hint: "Peça de madeira ou metal usada para travar portas ou janelas, mantendo-as fechadas.",
                // Fica visível na tela: C A R A L H O -> O jogador digita o 'U' para formar C A R A L H O
                displayPattern: ['C', 'A', 'R', 'A', 'L', 'H', '_'], 
                correctWord: "CARALHO", // Aqui o truque é aceitar a palavra porque em Portugal "Caralho" também significa a cesta no topo do mastro de navios, mas vamos induzir a outra variação limpa se preferir, ou cobrar a palavra náutica.
                // Para ser 100% inocente e quebrar as pernas:
                displayPattern: ['C', 'A', 'R', 'A', 'V', '_', 'L', 'A'], // C A R A V E L A, mas tirando o V vira outra coisa visualmente
                hint: "Pequeno prego de madeira ou cavilha usado em construções navais e marcenaria.",
                displayPattern: ['C', 'A', 'R', 'A', 'L', '_', 'O'], // Fica CARAL_O. Se colocar 'H' erra. O certo é 'H' para a peça náutica ou 'I' para CARALIO. Vamos usar o clássico do prego:
                correctWord: "CARALHO", 
                scold: "Sabia que CARALHO originalmente é o nome daquela cesta que fica no topo do mastro dos navios antigos? Mas você pensou besteira!"
            }
        ];

        // Ajustando a fase 3 para ficar incrivelmente óbvia e engraçada:
        levels[2] = {
            hint: "Instrumento agrícola de ferro usado para capinar, cavar ou revolver a terra.",
            displayPattern: ['C', 'A', 'R', 'A', 'L', 'H', '_'], // Falta só a última letra. Se botar O perde.
            correctWord: "CARALHA", // Variação regional da enxada ou ferramenta torta
            scold: "Se colocou 'O' no final perdeu! A resposta era CARALHA (uma antiga ferramenta de corte e capina)!"
        };

        let currentLevel = 0;
        let lives = 3;

        const hintText = document.getElementById('hintText');
        const wordDisplay = document.getElementById('wordDisplay');
        const levelDisplay = document.getElementById('levelDisplay');
        const livesDisplay = document.getElementById('livesDisplay');
        const winModal = document.getElementById('winModal');
        const loseModal = document.getElementById('loseModal');
        const loseReason = document.getElementById('loseReason');

        function loadLevel() {
            wordDisplay.innerHTML = '';
            const lvl = levels[currentLevel];
            
            levelDisplay.innerText = `Fase: ${currentLevel + 1}/${levels.length}`;
            updateLivesDisplay();
            hintText.innerText = `Dica: ${lvl.hint}`;

            lvl.displayPattern.forEach((char, index) => {
                const box = document.createElement('div');
                box.classList.add('letter-box');

                if (char !== '_') {
                    box.classList.add('fixed');
                    box.innerText = char;
                } else {
                    const input = document.createElement('input');
                    input.type = 'text';
                    input.maxLength = 1;
                    input.id = `input-${index}`;
                    
                    input.addEventListener('input', (e) => {
                        if (e.target.value.length === 1) {
                            const nextInput = document.getElementById(`input-${index + 1}`);
                            if (nextInput) nextInput.focus();
                        }
                    });

                    box.appendChild(input);
                }
                wordDisplay.appendChild(box);
            });
        }

        function updateLivesDisplay() {
            let hearts = "";
            for (let i = 0; i < lives; i++) hearts += "❤️ ";
            if (lives === 0) hearts = "💀";
            livesDisplay.innerText = `Vidas: ${hearts}`;
        }

        function verifyWord() {
            const lvl = levels[currentLevel];
            let userAssembledWord = "";

            lvl.displayPattern.forEach((char, index) => {
                if (char !== '_') {
                    userAssembledWord += char;
                } else {
                    const inputElement = document.getElementById(`input-${index}`);
                    userAssembledWord += (inputElement.value || "").toUpperCase();
                }
            });

            if (userAssembledWord === lvl.correctWord) {
                currentLevel++;
                if (currentLevel < levels.length) {
                    alert("Boa! Você resistiu ao óbvio e acertou o termo correto!");
                    loadLevel();
                } else {
                    winModal.style.display = 'flex';
                }
            } else {
                lives--;
                updateLivesDisplay();
                
                if (lives <= 0) {
                    loseReason.innerText = lvl.scold;
                    loseModal.style.display = 'flex';
                } else {
                    alert(`❌ ERROU!\n\n${lvl.scold}\nVocê perdeu 1 vida!`);
                    loadLevel();
                }
            }
        }

        function restartGame() {
            currentLevel = 0;
            lives = 3;
            winModal.style.display = 'none';
            loseModal.style.display = 'none';
            loadLevel();
        }

        loadLevel();
    </script>
</body>
</html>
