<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEON BALLS: INFINITE DROP</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #030306;
            color: #fff;
            font-family: system-ui, -apple-system, sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            user-select: none;
        }
        #game-container {
            position: relative;
            width: 100%;
            max-width: 400px;
            height: 100vh;
            background: #06060c;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            overflow: hidden;
            border: 1px solid #111;
        }
        /* Top HUD */
        #hud {
            width: 100%;
            padding: 12px;
            background: rgba(0,0,0,0.85);
            z-index: 10;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #1a1a26;
            font-size: 13px;
            font-weight: 800;
            letter-spacing: 1px;
        }
        #hud-gold { color: #ffd700; text-shadow: 0 0 8px rgba(255,215,0,0.4); }
        #hud-round { color: #00ffff; }
        
        /* Canvas */
        canvas {
            display: block;
            width: 100%;
            flex-grow: 1;
            background: #080812;
            cursor: crosshair;
        }
        /* Overlays / Telas */
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(5, 5, 10, 0.98);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            padding: 20px;
            text-align: center;
        }
        h1 {
            font-size: 34px;
            font-weight: 900;
            letter-spacing: 2px;
            background: linear-gradient(45deg, #00ffff, #ff00ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(0,255,255,0.2);
        }
        /* Upgrade Shop */
        #shop {
            width: 100%;
            max-width: 320px;
            margin-bottom: 25px;
        }
        .shop-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255,255,255,0.03);
            padding: 12px 16px;
            margin-bottom: 8px;
            border-radius: 8px;
            font-size: 12px;
            border-left: 3px solid #00ffff;
            text-align: left;
        }
        .buy-btn {
            background: #ff00ff;
            color: #fff;
            border: none;
            padding: 8px 14px;
            font-weight: 900;
            font-size: 11px;
            border-radius: 6px;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(255,0,255,0.3);
        }
        .buy-btn:disabled {
            background: #222;
            color: #555;
            box-shadow: none;
            cursor: not-allowed;
        }
        .main-btn {
            background: linear-gradient(135deg, #00ffff, #ff00ff);
            color: #000;
            border: none;
            padding: 16px 45px;
            font-size: 15px;
            font-weight: 900;
            border-radius: 30px;
            cursor: pointer;
            width: 100%;
            max-width: 260px;
            text-transform: uppercase;
            box-shadow: 0 0 25px rgba(0,255,255,0.4);
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="hud">
            <div>RODADA: <span id="hud-round">1</span></div>
            <div>OURO: <span id="hud-gold">0</span></div>
        </div>

        <canvas id="gameCanvas"></canvas>

        <div id="menu-screen" class="screen">
            <h1 id="menu-title">NEON BALLS</h1>
            
            <div style="font-size:12px; color:#ff00ff; font-weight:900; margin-bottom:12px; letter-spacing:1px; text-transform:uppercase;">Evolução de Arsenal Incremental</div>
            <div id="shop">
                <div class="shop-item">
                    <div>
                        <div><strong>Contagem de Bolas</strong></div>
                        <div style="color:#777">Total de disparos: <span id="sh-val-balls">1</span></div>
                    </div>
                    <button class="buy-btn" id="buy-balls">C: <span id="sh-cost-balls">10</span></button>
                </div>
                <div class="shop-item">
                    <div>
                        <div><strong>Poder de Impacto</strong></div>
                        <div style="color:#777">Dano por batida: <span id="sh-val-dmg">1</span></div>
                    </div>
                    <button class="buy-btn" id="buy-dmg">C: <span id="sh-cost-dmg">15</span></button>
                </div>
            </div>

            <button class="main-btn" id="start-btn">DISPARAR SALVA</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Interface DOM
        const hudRound = document.getElementById('hud-round');
        const hudGold = document.getElementById('hud-gold');
        const menuScreen = document.getElementById('menu-screen');
        const startBtn = document.getElementById('start-btn');
        const menuTitle = document.getElementById('menu-title');

        const buyBalls = document.getElementById('buy-balls'), shValBalls = document.getElementById('sh-val-balls'), shCostBalls = document.getElementById('sh-cost-balls');
        const buyDmg = document.getElementById('buy-dmg'), shValDmg = document.getElementById('sh-val-dmg'), shCostDmg = document.getElementById('sh-cost-dmg');

        // Engine de Som Sintetizado (Efeito Sonoro Acumulativo ASMR)
        let audioCtx = null;
        let lastHitTime = 0;
        let pitchPitch = 0;

        function playHitSound() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            let now = audioCtx.currentTime;
            
            // Se houver muitas colisões seguidas, o tom sobe de escala criando um senso de combo musical
            if (now - lastHitTime < 0.1) {
                pitchPitch = Math.min(600, pitchPitch + 20);
            } else {
                pitchPitch = 150;
            }
            lastHitTime = now;

            let osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            
            osc.type = 'sine';
            osc.frequency.setValueAtTime(pitchPitch + Math.random() * 30, now);
            gain.gain.setValueAtTime(0.03, now);
            gain.gain.exponentialRampToValueAtTime(0.001, now + 0.05);
            
            osc.start(now); osc.stop(now + 0.05);
        }

        // Dados Permanentes Progressivos
        let goldWallet = parseInt(localStorage.getItem('nb_gold')) || 0;
        let statBalls = parseInt(localStorage.getItem('nb_balls')) || 2;
        let statDmg = parseInt(localStorage.getItem('nb_dmg')) || 1;

        // Atributos Mecânicos
        let round = 1;
        let balls = [];
        let blocks = [];
        let particles = [];
        
        let isAiming = false;
        let isSimulating = false;
        let aimAngle = 0;
        
        // Posição fixa de lançamento no topo central
        let gunX = 0;
        let gunY = 25;

        // Sincronia da Loja
        function updateShopUI() {
            hudGold.textContent = goldWallet;
            hudRound.textContent = round;

            shValBalls.textContent = statBalls;
            let cBalls = statBalls * 8;
            shCostBalls.textContent = cBalls;
            buyBalls.disabled = goldWallet < cBalls;

            shValDmg.textContent = statDmg;
            let cDmg = statDmg * 12;
            shCostDmg.textContent = cDmg;
            buyDmg.disabled = goldWallet < cDmg;
        }

        buyBalls.addEventListener('click', (e) => {
            e.stopPropagation(); let cost = statBalls * 8;
            if(goldWallet >= cost) { goldWallet -= cost; statBalls += 2; saveStats(); }
        });
        buyDmg.addEventListener('click', (e) => {
            e.stopPropagation(); let cost = statDmg * 12;
            if(goldWallet >= cost) { goldWallet -= cost; statDmg += 1; saveStats(); }
        });

        function saveStats() {
            localStorage.setItem('nb_gold', goldWallet);
            localStorage.setItem('nb_balls', statBalls);
            localStorage.setItem('nb_dmg', statDmg);
            updateShopUI();
        }

        function resizeCanvas() {
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight - document.getElementById('hud').clientHeight;
            gunX = canvas.width / 2;
        }
        window.addEventListener('resize', resizeCanvas);

        // Inputs Simplificados (Arrastar para Mirar e Soltar)
        canvas.addEventListener('mousedown', startAim);
        canvas.addEventListener('mousemove', checkAim);
        canvas.addEventListener('mouseup', releaseBalls);

        canvas.addEventListener('touchstart', (e) => { startAim(e.touches[0]); }, {passive:true});
        canvas.addEventListener('touchmove', (e) => { checkAim(e.touches[0]); }, {passive:true});
        canvas.addEventListener('touchend', () => { releaseBalls(); }, {passive:true});

        function startAim(e) {
            if (isSimulating) return;
            isAiming = true;
            calculateAngle(e);
        }
        function checkAim(e) {
            if (!isAiming) return;
            calculateAngle(e);
        }
        function calculateAngle(e) {
            let rect = canvas.getBoundingClientRect();
            let mouseX = e.clientX - rect.left;
            let mouseY = e.clientY - rect.top;
            // Força a mira a apontar apenas para baixo para evitar travar no teto
            aimAngle = Math.atan2(Math.max(mouseY, gunY + 20) - gunY, mouseX - gunX);
        }

        function releaseBalls() {
            if (!isAiming) return;
            isAiming = false;
            isSimulating = true;
            menuScreen.style.display = 'none';

            // Dispara uma rajada cadenciada em fila indiana usando um timer/delay
            let count = 0;
            function spawnSequentialBall() {
                if (count < statBalls) {
                    balls.push({
                        x: gunX, y: gunY,
                        vx: Math.cos(aimAngle) * 7, vy: Math.sin(aimAngle) * 7,
                        radius: 5
                    });
                    count++;
                    setTimeout(spawnSequentialBall, 60); // Delay de 60ms entre cada bola
                }
            }
            spawnSequentialBall();
            requestAnimationFrame(gameLoop);
        }

        startBtn.addEventListener('click', () => {
            if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            resizeCanvas();
            startNextRoundSetup();
        });

        function startNextRoundSetup() {
            isSimulating = false;
            balls = [];
            particles = [];
            
            // Desce blocos antigos e gera uma nova fileira procedural
            for(let b of blocks) b.row++;
            
            // Condição de derrota: se algum bloco atingir o topo/limite superior reverso do fundo
            let lose = blocks.some(b => b.row > 8);
            if (lose) {
                goldWallet = 0; // Penalidade leve ou reinício de rodada
                round = 1;
                blocks = [];
                menuTitle.textContent = "SISTEMA RESETADO";
                saveStats();
            }

            // Gera novos blocos na linha 1. Números crescem exponencialmente com a rodada
            let cols = 6;
            let cellWidth = canvas.width / cols;
            for(let i=0; i<cols; i++) {
                if (Math.random() < 0.65) {
                    let hpMax = Math.floor(round * 2.2 * statDmg) + Math.floor(Math.random() * round);
                    blocks.push({
                        x: i * cellWidth + 4,
                        y: 0, // Controlado dinamicamente via row no render
                        w: cellWidth - 8,
                        h: 35,
                        hp: hpMax,
                        maxHp: hpMax,
                        row: 1
                    });
                }
            }

            updateShopUI();
            menuScreen.style.display = 'flex';
        }

        // Engine de Loop Física de Colisões Aceleradas
        function gameLoop() {
            if (!isSimulating) return;

            updatePhysics();
            render();

            // Se todas as bolas saírem da tela por baixo, a rodada de simulação acaba
            if (balls.length === 0 && isSimulating) {
                round++;
                startNextRoundSetup();
                return;
            }

            requestAnimationFrame(gameLoop);
        }

        function updatePhysics() {
            // Atualiza bolas
            for (let i = balls.length - 1; i >= 0; i--) {
                let b = balls[i];
                b.x += b.vx;
                b.y += b.vy;

                // Colisão de Paredes Laterais
                if (b.x < b.radius) { b.x = b.radius; b.vx *= -1; playHitSound(); }
                if (b.x > canvas.width - b.radius) { b.x = canvas.width - b.radius; b.vx *= -1; playHitSound(); }
                
                // Colisão de Teto
                if (b.y < b.radius + 50) { b.y = b.radius + 50; b.vy *= -1; playHitSound(); }

                // Elimina bola se cair no abismo inferior
                if (b.y > canvas.height + 20) {
                    balls.splice(i, 1);
                    continue;
                }

                // Colisão com os Blocos Geométricos Rects
                for (let j = blocks.length - 1; j >= 0; j--) {
                    let blk = blocks[j];
                    let blkY = blk.row * 48 + 40; // Mapeamento físico vertical

                    // Checa proximidade por caixa delimitadora expandida pelo raio da bola
                    if (b.x > blk.x - b.radius && b.x < blk.x + blk.w + b.radius &&
                        b.y > blkY - b.radius && b.y < blkY + blk.h + b.radius) {
                        
                        // Determina qual lado bateu para inverter o vetor correto
                        let distX = Math.min(Math.abs(b.x - blk.x), Math.abs(b.x - (blk.x + blk.w)));
                        let distY = Math.min(Math.abs(b.y - blkY), Math.abs(b.y - (blkY + blk.h)));

                        if (distX < distY) b.vx *= -1;
                        else b.vy *= -1;

                        // Computa dano e recompensa em ouro meta
                        blk.hp -= statDmg;
                        goldWallet += 1;
                        hudGold.textContent = goldWallet;
                        
                        playHitSound();
                        createSparkParticles(b.x, b.y);

                        if (blk.hp <= 0) {
                            blocks.splice(j, 1);
                        }
                        break; // Processa uma colisão por frame por bola para estabilidade
                    }
                }
            }

            // Atualiza partículas visuais
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx; p.y += p.vy; p.vy += 0.1; // Gravidade própria das faíscas
                p.life -= 0.04;
                if (p.life <= 0) particles.splice(i, 1);
            }
        }

        function createSparkParticles(x, y) {
            for(let i=0; i<4; i++) {
                particles.push({
                    x: x, y: y,
                    vx: (Math.random() - 0.5) * 4,
                    vy: (Math.random() - 0.5) * 4 - 1,
                    life: 1.0,
                    color: Math.random() < 0.5 ? '#00ffff' : '#ff00ff'
                });
            }
        }

        // Renderização Visual de Alta Densidade Neon
        function render() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Linha limite do teto/canhão
            ctx.strokeStyle = '#1a1a36';
            ctx.lineWidth = 2;
            ctx.beginPath(); ctx.moveTo(0, 50); ctx.lineTo(canvas.width, 50); ctx.stroke();

            // Desenhar Linha de Mira Preditiva Estética
            if (isAiming) {
                ctx.strokeStyle = 'rgba(0,255,255,0.25)';
                ctx.lineWidth = 2;
                ctx.setLineDash([6, 6]);
                ctx.beginPath();
                ctx.moveTo(gunX, gunY + 25);
                ctx.lineTo(gunX + Math.cos(aimAngle) * 180, gunY + 25 + Math.sin(aimAngle) * 180);
                ctx.stroke();
                ctx.setLineDash([]);
            }

            // Desenhar Blocos Coloridos Dinamicamente por Vida Restante
            for (let blk of blocks) {
                let blkY = blk.row * 48 + 40;
                let pct = blk.hp / blk.maxHp;
                
                // Transiciona de roxo neon para azul neon baseado na vida
                ctx.fillStyle = `rgba(${Math.floor(255 * (1-pct))}, ${Math.floor(255 * pct)}, 255, 0.12)`;
                ctx.fillRect(blk.x, blkY, blk.w, blk.h);

                ctx.strokeStyle = pct > 0.5 ? '#00ffff' : '#ff00ff';
                ctx.lineWidth = 2;
                ctx.shadowBlur = 6; ctx.shadowColor = ctx.strokeStyle;
                ctx.strokeRect(blk.x, blkY, blk.w, blk.h);
                ctx.shadowBlur = 0;

                // Texto interno do bloco (HP numérico)
                ctx.fillStyle = '#ffffff';
                ctx.font = 'bold 12px sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(blk.hp, blk.x + blk.w/2, blkY + blk.h/2);
            }

            // Desenhar Bolas Neon Ativas
            ctx.fillStyle = '#ffffff';
            ctx.shadowBlur = 10; ctx.shadowColor = '#00ffff';
            for (let b of balls) {
                ctx.beginPath();
                ctx.arc(b.x, b.y, b.radius, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.shadowBlur = 0;

            // Desenhar Partículas de Faíscas
            for (let p of particles) {
                ctx.save();
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x, p.y, 2, 2);
                ctx.restore();
            }

            // Desenhar Canhão/Emissor de Partículas no Topo
            ctx.fillStyle = '#111126';
            ctx.strokeStyle = '#00ffff';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.arc(gunX, 50, 16, 0, Math.PI * 2);
            ctx.fill(); ctx.stroke();
        }

        // Execução primária da UI
        resizeCanvas();
        updateShopUI();
    </script>
</body>
</html>
