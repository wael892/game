<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gartic Clone Realtime</title>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #ffd43b;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            height: -webkit-fill-available; /* Suporte para navegadores iOS */
            padding: 10px;
            overscroll-behavior: none;
            overflow: hidden;
        }

        /* Tela de Login */
        #login-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #ffd43b;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .login-box {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .login-box h2 {
            color: #118ab2;
            margin-bottom: 20px;
        }

        .login-box input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 2px solid #ced4da;
            border-radius: 8px;
            outline: none;
            font-size: 16px;
        }

        .login-box input:focus {
            border-color: #118ab2;
        }

        /* Estrutura Principal */
        header {
            text-align: center;
            margin-bottom: 10px;
            background: white;
            padding: 10px 20px;
            border-radius: 50px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 1200px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }

        h1 {
            color: #118ab2;
            font-size: 20px;
            flex-shrink: 0;
        }

        #word-display {
            font-weight: bold;
            font-size: 18px;
            color: #ef476f;
            background: #f8f9fa;
            padding: 5px 15px;
            border-radius: 20px;
            border: 2px dashed #ef476f;
            text-align: center;
            word-break: break-word;
        }

        #room-display {
            font-weight: bold;
            color: #666;
            font-size: 12px;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 2px;
            flex-shrink: 0;
        }

        #timer-display {
            font-weight: bold;
            color: #ef476f;
            font-size: 14px;
        }

        #main-container {
            display: flex;
            width: 100%;
            max-width: 1200px;
            flex: 1;
            gap: 10px;
            overflow: hidden;
        }

        /* Painel Lateral de Jogadores */
        #scoreboard {
            flex: 1;
            background: white;
            border-radius: 15px;
            padding: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #players-list {
            margin-top: 10px;
            overflow-y: auto;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .player-item {
            background: #f8f9fa;
            padding: 8px;
            border-radius: 6px;
            font-weight: bold;
            color: #333;
            font-size: 13px;
            border-left: 4px solid #118ab2;
            display: flex;
            justify-content: space-between;
        }

        .player-item.drawing {
            border-left-color: #ef476f;
            background: #ffe3e8;
        }

        /* Painel de Desenho */
        #canvas-container {
            flex: 3;
            background: white;
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        canvas {
            flex: 1;
            background: #ffffff;
            cursor: crosshair;
            touch-action: none; 
            width: 100%;
            height: 100%;
        }

        #tools {
            height: 60px;
            background: #e9ecef;
            display: flex;
            align-items: center;
            padding: 0 10px;
            gap: 10px;
            border-top: 2px solid #dee2e6;
            overflow-x: auto;
            flex-shrink: 0;
        }

        .color-circle {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
            flex-shrink: 0;
        }

        .color-circle.active {
            border-color: #000;
        }

        .btn {
            padding: 8px 12px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 13px;
            flex-shrink: 0;
        }

        .btn-clear { background: #ef476f; color: white; }

        /* Painel do Chat */
        #chat-container {
            flex: 1.5;
            background: white;
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #chat-messages {
            flex: 1;
            padding: 12px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .msg {
            padding: 6px 10px;
            border-radius: 5px;
            font-size: 13px;
            word-break: break-all;
            line-height: 1.4;
        }

        .msg-system { background: #e2f0d9; color: #385723; font-weight: bold; }
        .msg-success { background: #d1e7dd; color: #0f5132; font-weight: bold; border: 1px solid #badbcc; }
        .msg-normal { background: #f1f3f5; color: #333; }
        .msg-normal .username { font-weight: bold; color: #118ab2; }

        #chat-input-area {
            display: flex;
            padding: 8px;
            border-top: 2px solid #dee2e6;
            background: #f8f9fa;
            flex-shrink: 0;
        }

        #chat-input {
            flex: 1;
            padding: 8px;
            border: 2px solid #ced4da;
            border-radius: 5px;
            outline: none;
            font-size: 14px;
        }

        #btn-send {
            background: #118ab2;
            color: white;
            margin-left: 6px;
        }

        /* Otimizações Mobile Críticas Completas */
        @media (max-width: 768px) {
            body { 
                padding: 5px;
                overflow: hidden;
                position: relative;
            }
            
            header { 
                padding: 6px 10px; 
                margin-bottom: 5px; 
                border-radius: 10px;
                gap: 5px;
                height: 45px;
                width: 100%;
            }
            
            h1 { font-size: 12px; }
            
            #word-display { 
                font-size: 11px; 
                padding: 2px 6px; 
                border-radius: 6px;
                flex: 1;
            }
            
            #room-display { 
                font-size: 9px; 
            }
            
            #timer-display { font-size: 10px; }
            
            #main-container {
                position: absolute;
                top: 60px;
                left: 5px;
                right: 5px;
                bottom: 5px;
                flex-direction: column;
                display: flex !important;
                height: auto;
                gap: 5px;
            }
            
            #canvas-container { 
                flex: none !important;
                height: 40% !important;
                width: 100%;
                border-radius: 10px;
                display: flex;
                flex-direction: column;
            }
            
            #tools {
                height: 38px;
                padding: 0 5px;
                gap: 5px;
            }

            .color-circle {
                width: 20px;
                height: 20px;
            }

            .btn {
                padding: 4px 8px;
                font-size: 10px;
            }
            
            #chat-container { 
                flex: none !important;
                height: calc(60% - 5px) !important;
                width: 100%;
                border-radius: 10px;
                display: flex;
                flex-direction: column;
                overflow: hidden;
                background: white;
                position: relative;
            }

            #chat-messages {
                position: absolute;
                top: 0;
                left: 0;
                right: 0;
                bottom: 48px;
                padding: 6px;
                gap: 4px;
                overflow-y: auto;
            }
            
            .msg {
                padding: 4px 6px;
                font-size: 11px;
            }
            
            #chat-input-area {
                position: absolute;
                bottom: 0;
                left: 0;
                right: 0;
                height: 48px;
                padding: 6px;
                background: #f8f9fa;
                display: flex !important;
                align-items: center;
                border-top: 1px solid #dee2e6;
            }

            #chat-input {
                padding: 8px;
                font-size: 16px; /* Impede zoom indesejado no iOS */
                height: 100%;
                border: 1px solid #ced4da;
            }

            #btn-send {
                padding: 0 14px;
                font-size: 13px;
                height: 100%;
                margin-left: 6px;
                display: flex;
                align-items: center;
                justify-content: center;
            }

            #scoreboard { display: none !important; }
        }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h2>Gartic Clone Realtime</h2>
            <input type="text" id="input-username" placeholder="Seu Nome / Apelido" required>
            <input type="text" id="input-room" placeholder="Nome da Sala (ex: sala123)" required>
            <button class="btn btn-draw" style="width: 100%; padding: 12px; font-size: 16px;" onclick="connectToGame()">ENTRAR NO JOGO</button>
        </div>
    </div>

    <header>
        <h1>GARTIC</h1>
        <div id="word-display">Aguardando jogadores...</div>
        <div id="room-display">
            <span id="room-id">Sala: Não conectado</span>
            <span id="timer-display">Tempo: --</span>
        </div>
    </header>

    <div id="main-container">
        <div id="scoreboard">
            <h3 style="color: #555; padding-bottom: 5px; border-bottom: 2px solid #f1f3f5;">Jogadores na Sala:</h3>
            <div id="players-list"></div>
        </div>

        <div id="canvas-container">
            <canvas id="canvas"></canvas>
            <div id="tools">
                <div class="color-circle active" style="background: #000000;" onclick="changeColor('#000000', this)"></div>
                <div class="color-circle" style="background: #ef476f;" onclick="changeColor('#ef476f', this)"></div>
                <div class="color-circle" style="background: #ffd166;" onclick="changeColor('#ffd166', this)"></div>
                <div class="color-circle" style="background: #06d6a0;" onclick="changeColor('#06d6a0', this)"></div>
                <div class="color-circle" style="background: #118ab2;" onclick="changeColor('#118ab2', this)"></div>
                <button class="btn btn-clear" onclick="sendClear()">Limpar</button>
            </div>
        </div>

        <div id="chat-container">
            <div id="chat-messages"></div>
            <div id="chat-input-area">
                <input type="text" id="chat-input" placeholder="Digite seu palpite aqui..." autocomplete="off">
                <button id="btn-send" class="btn" onclick="sendChatMessage()">Enviar</button>
            </div>
        </div>
    </div>

    <script>
        let username = "";
        let roomName = "";
        let mqttClient = null;
        let baseTopic = "";
        const listaJogadores = new Set();

        // Variáveis do Estado do Jogo
        let isDrawer = false;
        let currentWord = "";
        let currentDrawerName = "";
        let roundActive = false;
        let currentDrawerIndex = -1;
        
        // Controle de Tempo Local
        let countdownInterval = null;
        let nextRoundTimeout = null;
        const TEMPO_RODADA = 60;

        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let drawing = false;
        let currentColor = '#000000';

        // Definição de resolução estável compartilhada universalmente (800x600)
        const VIRTUAL_WIDTH = 800;
        const VIRTUAL_HEIGHT = 600;

        const PALAVRAS = ["Cachorro", "Gato", "Carro", "Aviao", "Banana", "Maca", "Casa", "Arvore", "Bola", "Computador", "Celular", "Caneta", "Chave", "Livro", "Relogio", "Cadeira", "Garfo", "Sapato", "Oculos", "Sol", "Lua", "Flor", "Peixe", "Passaro"];

        function ajustarAlturaJanela() {
            document.body.style.height = window.innerHeight + "px";
        }
        window.addEventListener('resize', ajustarAlturaJanela);
        window.addEventListener('load', ajustarAlturaJanela);
        ajustarAlturaJanela();

        // Inicializa o tamanho lógico fixo do canvas independente da proporção do CSS da tela física
        function initCanvasResolution() {
            canvas.width = VIRTUAL_WIDTH;
            canvas.height = VIRTUAL_HEIGHT;
            ctx.lineCap = 'round';
            ctx.lineWidth = 6; // Linha ligeiramente mais espessa para manter excelente visibilidade em telas HD
        }
        initCanvasResolution();

        // Captura e normaliza as coordenadas físicas da tela para o espaço virtual de 800x600
        function getCanvasCoordinates(clientX, clientY) {
            const rect = canvas.getBoundingClientRect();
            // Calcula a posição do toque relativa ao elemento canvas na tela
            const physicalX = clientX - rect.left;
            const physicalY = clientY - rect.top;
            
            // Transforma proporcionalmente para a escala estrita de 800x600
            const virtualX = (physicalX / rect.width) * VIRTUAL_WIDTH;
            const virtualY = (physicalY / rect.height) * VIRTUAL_HEIGHT;
            
            return { x: virtualX, y: virtualY };
        }

        // Eventos de Mouse
        canvas.addEventListener('mousedown', (e) => {
            const coords = getCanvasCoordinates(e.clientX, e.clientY);
            startDrawing(coords.x, coords.y);
        });
        canvas.addEventListener('mousemove', (e) => {
            const coords = getCanvasCoordinates(e.clientX, e.clientY);
            draw(coords.x, coords.y);
        });
        canvas.addEventListener('mouseup', stopDrawing);
        canvas.addEventListener('mouseout', stopDrawing);

        // Eventos de Toque Mobile corrigidos com suporte para múltiplos DPIs e travas preventivas
        canvas.addEventListener('touchstart', (e) => { 
            if (e.touches.length === 1) {
                e.preventDefault();
                const coords = getCanvasCoordinates(e.touches[0].clientX, e.touches[0].clientY);
                startDrawing(coords.x, coords.y);
            }
        }, { passive: false });

        canvas.addEventListener('touchmove', (e) => { 
            if (e.touches.length === 1) {
                e.preventDefault();
                const coords = getCanvasCoordinates(e.touches[0].clientX, e.touches[0].clientY);
                draw(coords.x, coords.y);
            }
        }, { passive: false });

        canvas.addEventListener('touchend', (e) => {
            e.preventDefault();
            stopDrawing();
        });

        function startDrawing(x, y) {
            if (!isDrawer || !roundActive) return;
            drawing = true;
            ctx.beginPath();
            ctx.moveTo(x, y);
            sendDrawData('start', x, y, currentColor);
        }

        function draw(x, y) {
            if (!drawing || !isDrawer || !roundActive) return;
            ctx.strokeStyle = currentColor;
            ctx.lineTo(x, y);
            ctx.stroke();
            sendDrawData('draw', x, y, currentColor);
        }

        function stopDrawing() {
            if (!isDrawer) return;
            drawing = false;
            sendDrawData('stop', 0, 0, currentColor);
        }

        function changeColor(color, element) {
            currentColor = color;
            document.querySelectorAll('.color-circle').forEach(el => el.classList.remove('active'));
            element.classList.add('active');
        }

        function connectToGame() {
            username = document.getElementById('input-username').value.trim();
            roomName = document.getElementById('input-room').value.trim().toLowerCase().replace(/[^a-z0-9]/g, "");

            if (!username || !roomName) {
                alert("Por favor, digite seu nome e o nome da sala!");
                return;
            }

            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('room-id').innerText = "Sala: " + roomName;
            
            adicionarJogadorLista(username);
            initMqtt();
        }

        function initMqtt() {
            baseTopic = "gartic_clone_free_2026/" + roomName;
            mqttClient = mqtt.connect('wss://broker.hivemq.com:8884/mqtt');

            mqttClient.on('connect', () => {
                mqttClient.subscribe(baseTopic + "/chat");
                mqttClient.subscribe(baseTopic + "/draw");
                mqttClient.subscribe(baseTopic + "/presence");
                mqttClient.subscribe(baseTopic + "/presence/echo");
                mqttClient.subscribe(baseTopic + "/gameflow");

                const identityPayload = JSON.stringify({ sender: "Sistema", text: `${username} entrou na sala.`, name: username });
                mqttClient.publish(baseTopic + "/chat", identityPayload);
                mqttClient.publish(baseTopic + "/presence", identityPayload);

                setTimeout(() => {
                    checkAndAutoStart();
                }, 2000);
            });

            mqttClient.on('message', (topic, message) => {
                const data = JSON.parse(message.toString());

                if (topic === baseTopic + "/chat") {
                    if (data.sender === "Sistema") {
                        addSystemMessage(data.text);
                        if (data.name) {
                            adicionarJogadorLista(data.name);
                            checkAndAutoStart();
                        }
                    } else if (data.isCorrect) {
                        addSuccessMessage(data.sender, data.text);
                        handleRoundEndAutomatically();
                    } else {
                        renderNormalMessage(data.sender, data.text);
                    }
                } else if (topic === baseTopic + "/draw" && !isDrawer) {
                    renderRemoteDraw(data);
                } else if (topic === baseTopic + "/presence") {
                    if (data.name && data.name !== username) {
                        adicionarJogadorLista(data.name);
                        mqttClient.publish(baseTopic + "/presence/echo", JSON.stringify({ name: username }));
                        checkAndAutoStart();
                    }
                } else if (topic === baseTopic + "/presence/echo") {
                    if (data.name && data.name !== username) {
                        adicionarJogadorLista(data.name);
                        checkAndAutoStart();
                    }
                } else if (topic === baseTopic + "/gameflow") {
                    handleGameFlow(data);
                }
            });
        }

        function checkAndAutoStart() {
            if (!roundActive && currentDrawerName === "" && listaJogadores.size > 0) {
                const playersArr = Array.from(listaJogadores);
                if (playersArr[0] === username) {
                    drawNewRound();
                }
            }
        }

        function drawNewRound() {
            if (!mqttClient) return;
            const playersArr = Array.from(listaJogadores);
            if (playersArr.length === 0) return;

            currentDrawerIndex = (currentDrawerIndex + 1) % playersArr.length;
            const nextDrawer = playersArr[currentDrawerIndex];
            const randomWord = PALAVRAS[Math.floor(Math.random() * PALAVRAS.length)];

            const flowPayload = JSON.stringify({
                drawer: nextDrawer,
                word: randomWord,
                currentIndex: currentDrawerIndex
            });

            mqttClient.publish(baseTopic + "/gameflow", flowPayload);
        }

        function handleGameFlow(data) {
            clearInterval(countdownInterval);
            clearTimeout(nextRoundTimeout);

            currentDrawerName = data.drawer;
            currentWord = data.word;
            currentDrawerIndex = data.currentIndex;
            roundActive = true;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            document.querySelectorAll('.player-item').forEach(el => el.classList.remove('drawing'));
            const drawerEl = document.getElementById("p-" + currentDrawerName.replace(/\s+/g, '-'));
            if (drawerEl) drawerEl.classList.add('drawing');

            if (currentDrawerName === username) {
                isDrawer = true;
                document.getElementById('word-display').innerText = "Sua Palavra: " + currentWord.toUpperCase();
                addSystemMessage(`Sua vez de desenhar! Palavra: ${currentWord.toUpperCase()}`);
            } else {
                isDrawer = false;
                let underscores = "_ ".repeat(currentWord.length).trim();
                document.getElementById('word-display').innerText = "Desenho de " + currentDrawerName + " (" + underscores + ")";
                addSystemMessage(`${currentDrawerName} está desenhando... tente adivinhar!`);
            }

            startLocalTimer(TEMPO_RODADA);
        }

        function startLocalTimer(seconds) {
            let timeLeft = seconds;
            document.getElementById('timer-display').innerText = "Tempo: " + timeLeft + "s";

            countdownInterval = setInterval(() => {
                timeLeft--;
                if (timeLeft <= 0) {
                    clearInterval(countdownInterval);
                    document.getElementById('timer-display').innerText = "Tempo: 0s";
                    addSystemMessage(`O tempo acabou! A palavra era: ${currentWord.toUpperCase()}`);
                    handleRoundEndAutomatically();
                } else {
                    document.getElementById('timer-display').innerText = "Tempo: " + timeLeft + "s";
                }
            }, 1000);
        }

        function handleRoundEndAutomatically() {
            roundActive = false;
            clearInterval(countdownInterval);

            if (currentDrawerName === username) {
                nextRoundTimeout = setTimeout(() => {
                    drawNewRound();
                }, 4000);
            }
        }

        function adicionarJogadorLista(nome) {
            if (listaJogadores.has(nome)) return;
            listaJogadores.add(nome);

            const container = document.getElementById('players-list');
            if (!container) return;
            const item = document.createElement('div');
            item.className = "player-item";
            item.id = "p-" + nome.replace(/\s+/g, '-');
            item.innerText = nome;
            container.appendChild(item);
        }

        function sendDrawData(action, x, y, color) {
            if (!mqttClient) return;
            const payload = JSON.stringify({ action, x, y, color });
            mqttClient.publish(baseTopic + "/draw", payload);
        }

        function renderRemoteDraw(data) {
            ctx.strokeStyle = data.color;
            if (data.action === 'start') {
                ctx.beginPath();
                ctx.moveTo(data.x, data.y);
            } else if (data.action === 'draw') {
                ctx.lineTo(data.x, data.y);
                ctx.stroke();
            } else if (data.action === 'clear') {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
            }
        }

        function sendClear() {
            if (!isDrawer) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (mqttClient) mqttClient.publish(baseTopic + "/draw", JSON.stringify({ action: 'clear' }));
        }

        function sendChatMessage() {
            const input = document.getElementById('chat-input');
            const msgText = input.value.trim();
            if (!msgText || !mqttClient) return;

            const palpiteLimpo = msgText.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
            const respostaLimpa = currentWord.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");

            if (roundActive && !isDrawer && palpiteLimpo === respostaLimpa) {
                const payload = JSON.stringify({ 
                    sender: username, 
                    text: `Acertou a palavra secreta: ${currentWord.toUpperCase()}! 🎯`, 
                    isCorrect: true 
                });
                mqttClient.publish(baseTopic + "/chat", payload);
            } else {
                const payload = JSON.stringify({ sender: username, text: msgText, isCorrect: false });
                mqttClient.publish(baseTopic + "/chat", payload);
            }
            input.value = "";
        }

        document.getElementById('chat-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') sendChatMessage();
        });

        function addSystemMessage(text) {
            const chatMessages = document.getElementById('chat-messages');
            const m = document.createElement('div');
            m.className = "msg msg-system";
            m.innerText = text;
            chatMessages.appendChild(m);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function addSuccessMessage(sender, text) {
            const chatMessages = document.getElementById('chat-messages');
            const m = document.createElement('div');
            m.className = "msg msg-success";
            m.innerText = `${sender} ${text}`;
            chatMessages.appendChild(m);
            chatMessages.scrollTop = chatMessages.scrollHeight;
            document.getElementById('word-display').innerText = "Adivinhado! Próxima rodada em instantes...";
        }

        function renderNormalMessage(sender, text) {
            const chatMessages = document.getElementById('chat-messages');
            const m = document.createElement('div');
            m.className = "msg msg-normal";
            
            const spanName = document.createElement('span');
            spanName.className = "username";
            spanName.innerText = sender + ": ";

            m.appendChild(spanName);
            m.appendChild(document.createTextNode(text));
            chatMessages.appendChild(m);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }
    </script>
</body>
</html>
