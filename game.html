<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEON DUNGEON SLAYER</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #020204;
            color: #fff;
            font-family: system-ui, -apple-system, sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            user-select: none;
        }
        #game-container {
            position: relative;
            width: 100%;
            max-width: 400px;
            height: 100vh;
            background: #050508;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            overflow: hidden;
            border: 1px solid #111;
        }
        /* Top HUD */
        #hud {
            width: 100%;
            padding: 10px;
            background: rgba(0,0,0,0.5);
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        #xp-bar-container {
            width: 100%;
            height: 8px;
            background: #222;
            border-radius: 4px;
            overflow: hidden;
        }
        #xp-bar {
            width: 0%;
            height: 100%;
            background: #00ffff;
            box-shadow: 0 0 10px #00ffff;
            transition: width 0.1s linear;
        }
        #hud-stats {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            font-weight: bold;
        }
        /* Canvas de Combate */
        canvas {
            background: #08080f;
            display: block;
            width: 100%;
            flex-grow: 1;
        }
        /* Telas Popups */
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(4, 4, 8, 0.98);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            padding: 20px;
            text-align: center;
        }
        h1 {
            font-size: 32px;
            font-weight: 900;
            letter-spacing: 2px;
            background: linear-gradient(45deg, #ff00ff, #00ffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
        }
        /* Menu de Level Up (Escolha de Habilidades) */
        #level-up-screen {
            display: none;
            background: rgba(5, 5, 10, 0.95);
        }
        .card-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            max-width: 300px;
            margin-top: 20px;
        }
        .card {
            background: #11111a;
            border: 1px solid #ff00ff;
            border-radius: 8px;
            padding: 15px;
            cursor: pointer;
            transition: transform 0.1s, background 0.1s;
            text-align: left;
        }
        .card:active {
            transform: scale(0.98);
            background: #221122;
        }
        .card-title {
            font-weight: bold;
            color: #00ffff;
            font-size: 14px;
            margin-bottom: 4px;
        }
        .card-desc {
            font-size: 12px;
            color: #aaa;
        }
        /* Loja de Atributos Permanentes */
        #shop {
            width: 100%;
            max-width: 300px;
            margin-bottom: 25px;
        }
        .shop-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #111;
            padding: 10px;
            margin-bottom: 6px;
            border-radius: 6px;
            font-size: 12px;
            border-left: 3px solid #ff00ff;
        }
        .buy-btn {
            background: #00ffff;
            color: #000;
            border: none;
            padding: 6px 12px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
        }
        .buy-btn:disabled {
            background: #333;
            color: #666;
        }
        .main-btn {
            background: linear-gradient(135deg, #00ffff, #ff00ff);
            color: #000;
            border: none;
            padding: 15px 40px;
            font-size: 16px;
            font-weight: 900;
            border-radius: 30px;
            cursor: pointer;
            width: 100%;
            max-width: 260px;
            text-transform: uppercase;
            box-shadow: 0 0 15px rgba(0,255,255,0.3);
        }
    </style>
</head>
