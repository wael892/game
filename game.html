<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gartic Strip Proibidão Realtime - Sync Total</title>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

        body {
            background-color: #ffd43b;
            display: flex; flex-direction: column; align-items: center;
            height: 100vh; height: -webkit-fill-available;
            padding: 8px; overscroll-behavior: none; overflow: hidden;
        }

        #login-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #ffd43b; display: flex; justify-content: center;
            align-items: center; z-index: 1000;
        }
        .login-box {
            background: white; padding: 30px; border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            width: 100%; max-width: 400px; text-align: center;
        }
        .login-box h2 { color: #e63946; margin-bottom: 20px; }
        .login-box input {
            width: 100%; padding: 12px; margin-bottom: 15px;
            border: 2px solid #ced4da; border-radius: 8px;
            outline: none; font-size: 16px;
        }
        .login-box input:focus { border-color: #e63946; }
        
        .gender-selector {
            display: flex; gap: 10px; margin-bottom: 15px; justify-content: center;
        }
        .gender-btn {
            flex: 1; padding: 10px; border: 2px solid #ced4da; border-radius: 8px;
            cursor: pointer; font-weight: bold; background: #f8f9fa; transition: all 0.2s;
        }
        .gender-btn.selected[data-gender="M"] { background: #118ab2; color: white; border-color: #0f7495; }
        .gender-btn.selected[data-gender="F"] { background: #ef476f; color: white; border-color: #d82b53; }

        .login-box textarea {
            width: 100%; padding: 12px; margin-bottom: 15px;
            border: 2px solid #ced4da; border-radius: 8px;
            outline: none; font-size: 14px; resize: vertical;
            min-height: 70px; color: #333;
        }
        .login-box textarea:focus { border-color: #e63946; }

        header {
            text-align: center; margin-bottom: 6px; background: white;
            padding: 8px 16px; border-radius: 50px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            width: 100%; max-width: 1400px;
            display: flex; justify-content: space-between; align-items: center;
            gap: 10px; flex-shrink: 0; position: relative;
        }
        h1 { color: #e63946; font-size: 20px; flex-shrink: 0; }
        #word-display {
            font-weight: bold; font-size: 16px; color: #d90429;
            background: #f8f9fa; padding: 4px 14px; border-radius: 20px;
            border: 2px dashed #d90429; text-align: center; word-break: break-word; flex: 1;
        }
        #room-display {
            font-weight: bold; color: #666; font-size: 12px;
            display: flex; flex-direction: column; align-items: flex-end;
            gap: 2px; flex-shrink: 0;
        }
        #timer-display { font-weight: bold; color: #d90429; font-size: 14px; }

        .btn-words-toggle {
            background: #e63946; color: white; border: none; padding: 6px 12px;
            border-radius: 20px; font-weight: bold; font-size: 12px; cursor: pointer;
            display: flex; align-items: center; gap: 4px; transition: background 0.2s;
        }
        #words-management-panel {
            position: absolute; top: 55px; left: 16px; background: white;
            padding: 12px; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.2);
            border: 2px solid #e63946; z-index: 600; width: 280px; display: none;
            flex-direction: column; gap: 8px; text-align: left;
        }
        #words-management-panel textarea {
            width: 100%; height: 60px; padding: 6px; font-size: 12px;
            border: 1px solid #ced4da; border-radius: 6px; resize: none; outline: none;
        }

        #main-container {
            display: flex; width: 100%; max-width: 1400px;
            flex: 1; gap: 8px; overflow: hidden; min-height: 0;
        }

        #scoreboard {
            flex: 0 0 180px; background: white; border-radius: 12px; padding: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            display: flex; flex-direction: column; overflow: hidden;
        }
        #scoreboard h3 { color: #555; padding-bottom: 5px; border-bottom: 2px solid #f1f3f5; font-size: 14px; }
        #players-list {
            margin-top: 8px; overflow-y: auto; flex: 1;
            display: flex; flex-direction: column; gap: 5px;
        }
        .player-item {
            background: #f8f9fa; padding: 7px 8px; border-radius: 6px;
            font-weight: bold; color: #333; font-size: 11px;
            border-left: 4px solid #e63946;
            display: flex; flex-direction: column; gap: 3px;
        }
        .player-item.drawing { border-left-color: #d90429; background: #ffe3e8; }
        .player-meta-row { display: flex; justify-content: space-between; align-items: center; width: 100%; }
        .player-name { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100px; }
        .player-strip-inventory {
            font-size: 9px; color: #666; font-weight: normal; background: #e9ecef;
            padding: 2px 4px; border-radius: 4px; width: 100%; text-align: left;
            word-break: break-all; margin-top: 1px;
        }
        .player-score {
            background: #e63946; color: white; border-radius: 10px;
            padding: 1px 7px; font-size: 11px; font-weight: bold;
            min-width: 32px; text-align: center; flex-shrink: 0;
        }

        #canvas-container {
            flex: 1; background: white; border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            display: flex; flex-direction: column; overflow: hidden; position: relative;
            min-width: 0;
        }
        canvas {
            flex: 1; background: #ffffff; cursor: crosshair;
            touch-action: none; width: 100%; height: 100%; display: block;
            -webkit-user-select: none; user-select: none;
        }

        #round-announcement {
            position: absolute; top: 35%; left: 50%; transform: translate(-50%, -50%) scale(0.5);
            background: rgba(32, 10, 15, 0.95); color: white;
            padding: 18px 30px; border-radius: 16px; font-weight: bold; text-align: center;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4); border: 3px solid #ff6b6b;
            z-index: 500; pointer-events: none; display: none; opacity: 0;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            max-width: 85%; width: max-content;
        }
        #round-announcement.show { display: block; opacity: 1; transform: translate(-50%, -50%) scale(1); }

        #tools {
            background: #200a0f; display: flex; flex-direction: column;
            padding: 8px; gap: 6px; border-right: 3px solid #ff6b6b; width: 56px; flex-shrink: 0;
        }
        .tool-btn {
            width: 38px; height: 38px; border-radius: 8px;
            border: 2px solid transparent; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 16px; background: #3d1921; color: white;
        }
        .tool-btn.active { background: #ff6b6b; color: #200a0f; border-color: #d90429; }

        .brush-sizes { display: flex; flex-direction: column; gap: 4px; align-items: center; }
        .size-btn { cursor: pointer; border-radius: 50%; background: white; border: 2px solid #555; }
        .size-btn.active { border-color: #ff6b6b; box-shadow: 0 0 0 2px rgba(255,107,107,0.5); }

        #palette-container { flex: 0 0 46px; background: #200a0f; border-radius: 12px; display: flex; flex-direction: column; padding: 6px 4px; gap: 4px; }
        #palette-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 4px; overflow-y: auto; flex: 1; }
        .color-swatch { width: 18px; height: 18px; border-radius: 4px; cursor: pointer; border: 2px solid transparent; }
        .color-swatch.active { border-color: white; }

        #bottom-actions { display: flex; gap: 6px; padding: 6px 8px; background: #200a0f; border-top: 2px solid #3d1921; align-items: center; flex-shrink: 0; flex-wrap: wrap; }
        .btn { padding: 6px 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 12px; color: white; -webkit-tap-highlight-color: transparent; }
        .btn-clear { background: #d90429; }
        .btn-skip { background: #f4a261; display: none; }
        
        .action-interact-btn {
            color: white; font-size: 13px; padding: 5px 10px; border-radius: 7px; border: none; cursor: pointer; font-weight: bold; flex-shrink: 0; display: none;
            -webkit-tap-highlight-color: transparent;
        }
        #btn-egg { background: #7209b7; }
        #btn-flower { background: #f72585; }
        #btn-slap { background: #ffb703; color: #200a0f; }
        #btn-kick { background: #e63946; }
        .action-interact-btn.cooldown { opacity: 0.4; pointer-events: none; }

        #right-chats-wrapper { flex: 0 0 240px; display: flex; flex-direction: column; gap: 8px; overflow: hidden; }
        .chat-box-container { flex: 1; background: white; border-radius: 12px; display: flex; flex-direction: column; overflow: hidden; }
        .chat-title-bar { background: #200a0f; color: white; padding: 4px 8px; font-size: 11px; font-weight: bold; text-transform: uppercase; }
        .chat-messages-area { flex: 1; padding: 8px; overflow-y: auto; display: flex; flex-direction: column; gap: 4px; }
        .msg { padding: 4px 6px; border-radius: 5px; font-size: 11px; word-break: break-all; }
        .msg-system  { background: #fae0e4; color: #7209b7; font-weight: bold; }
        .msg-success { background: #d1e7dd; color: #0f5132; font-weight: bold; }
        .msg-wrong   { background: #ffe3e8; color: #c92a2a; }
        .msg-normal  { background: #f1f3f5; color: #333; }
        .msg-normal .username { font-weight: bold; color: #e63946; }

        #egg-overlay { 
            position: fixed; inset: 0; pointer-events: none; background: rgba(114, 9, 183, 0.75); opacity: 0; z-index: 9998; 
            display: flex; align-items: center; justify-content: center; font-size: 32px; color: white; font-weight: bold;
        }
        #egg-overlay.splat { animation: splatFade 1.5s ease-out forwards; }
        @keyframes splatFade { 0% { opacity: 0.9; } 80% { opacity: 0.9; } 100% { opacity: 0; } }

        @media (max-width: 768px) {
            #main-container { position: absolute; top: 52px; left: 4px; right: 4px; bottom: 4px; flex-direction: column; gap: 4px; }
            #scoreboard { flex: 0 0 54px !important; width: 100%; flex-direction: row; }
            #players-list { flex-direction: row !important; overflow-x: auto; margin-top: 0; gap: 5px; }
            .player-item { padding: 3px 6px; height: 44px; inline-size: max-content; }
            #tools { width: 100%; flex-direction: row; height: 50px; border-right: none; }
            #palette-container { width: 100%; height: 42px; flex-direction: row; }
            #palette-grid { grid-template-columns: repeat(14, 22px); }
            #bottom-actions { padding: 4px 6px; max-height: 80px; overflow-y: auto; }
            #right-chats-wrapper { flex: 0 0 150px !important; flex-direction: row !important; }
        }
    </style>
</head>
<body>

<div id="egg-overlay"></div>

<div id="login-screen">
    <div class="login-box">
        <h2>🌶️ Gartic Strip Proibidão</h2>
        <input type="text" id="input-username" placeholder=" Seu Nome / Apelido Safado" required>
        <p style="font-size: 11px; font-weight: bold; color: #555; margin-bottom: 5px; text-align: left;">Escolha seu guarda-roupa inicial:</p>
        <div class="gender-selector">
            <div class="gender-btn" data-gender="M" onclick="selectGender('M')">Masculino ♂️</div>
            <div class="gender-btn" data-gender="F" onclick="selectGender('F')">Feminino ♀️</div>
        </div>
        <input type="text" id="input-room" placeholder="🔑 Nome do Motel / Sala Privada" required>
        <textarea id="input-custom-words" placeholder="📝 Palavras/Fetiches (opcional)"></textarea>
        <button class="btn" style="width:100%;padding:12px;background:#e63946;" onclick="connectToGame()">🚀 ENTRAR NO JOGO</button>
    </div>
</div>

<header>
    <h1>🌶️ STRIP GARTIC</h1>
    <button class="btn-words-toggle" onclick="toggleWordsPanel()">📝 Palavras</button>
    <div id="words-management-panel">
        <textarea id="runtime-new-words" placeholder="Adicionar por vírgula..."></textarea>
        <div style="display:flex; justify-content: flex-end; gap:4px;">
            <button class="btn" style="background:#ef476f;" onclick="toggleWordsPanel()">Fechar</button>
            <button class="btn" style="background:#06d6a0;" onclick="submitRuntimeWords()">Injetar</button>
        </div>
    </div>
    <div id="word-display">⏳ Esperando conexões...</div>
    <div id="room-display">
        <span id="room-id">Motel: —</span>
        <span id="timer-display">⏱️ Clímax: --</span>
    </div>
</header>

<div id="main-container">
    <div id="scoreboard">
        <h3>🏆 Armário</h3>
        <div id="players-list"></div>
    </div>

    <div id="canvas-wrapper">
        <div id="drawing-area">
            <div id="tools">
                <div class="tool-btn active" id="tool-brush" onclick="setTool('brush')">✏️</div>
                <div class="tool-btn" id="tool-eraser" onclick="setTool('eraser')">🧹</div>
                <div class="tool-btn" id="tool-fill" onclick="setTool('fill')">🪣</div>
                <div class="tool-separator"></div>
                <div class="tool-btn active" id="shape-free" onclick="setShape('free')">〰️</div>
                <div class="tool-btn" id="shape-circle" onclick="setShape('circle')">⭕</div>
                <div class="tool-btn" id="shape-square" onclick="setShape('square')">⬜</div>
                <div class="tool-btn" id="shape-triangle" onclick="setShape('triangle')">🔺</div>
                <div class="tool-btn" id="shape-spray" onclick="setShape('spray')">💨</div>
                <div class="tool-separator"></div>
                <div class="brush-sizes">
                    <div class="size-btn active" id="size-2" style="width:6px;height:6px;" onclick="setBrushSize(2,this)"></div>
                    <div class="size-btn" id="size-5" style="width:10px;height:10px;" onclick="setBrushSize(5,this)"></div>
                    <div class="size-btn" id="size-10" style="width:14px;height:14px;" onclick="setBrushSize(10,this)"></div>
                    <div class="size-btn" id="size-20" style="width:18px;height:18px;" onclick="setBrushSize(20,this)"></div>
                </div>
                <div class="tool-separator"></div>
                <div id="current-color-display" style="background:#000000; width:30px; height:30px; border-radius:4px; border:1px solid white;"></div>
            </div>

            <div id="canvas-container">
                <div id="round-announcement">
                    <h2 id="announcement-title">RODADA</h2>
                    <p id="announcement-desc">O que mudou</p>
                </div>
                <canvas id="canvas"></canvas>
            </div>
        </div>
        <div id="bottom-actions">
            <button class="btn btn-clear" onclick="sendClear()">🗑️ Limpar</button>
            <button id="btn-skip" class="btn btn-skip" onclick="skipRound()">⏭️ Passar</button>
            <button id="btn-egg" class="action-interact-btn" onclick="throwInteractItem('egg')">🍆 Berinjela!</button>
            <button id="btn-flower" class="action-interact-btn" onclick="throwInteractItem('flower')">🍑 Sarrada!</button>
            <button id="btn-slap" class="action-interact-btn" onclick="throwInteractItem('slap')">👋 Tapa!</button>
            <button id="btn-kick" class="action-interact-btn" onclick="throwInteractItem('kick')">👟 Chute!</button>
        </div>
    </div>

    <div id="palette-container">
        <div id="palette-grid"></div>
        <input type="color" id="color-custom" style="width:100%; margin-top:4px;" onchange="pickCustomColor(this)">
    </div>

    <div id="right-chats-wrapper">
        <div class="chat-box-container">
            <div class="chat-title-bar">🎯 Palpites</div>
            <div id="guess-messages" class="chat-messages-area"></div>
            <div class="chat-input-row">
                <input type="text" id="guess-input" class="chat-input-field" placeholder="Chute aqui...">
                <button class="chat-send-btn" onclick="sendGuessMessage()">➤</button>
            </div>
        </div>
        <div class="chat-box-container">
            <div class="chat-title-bar">💬 Conversa</div>
            <div id="chat-messages" class="chat-messages-area"></div>
            <div class="chat-input-row">
                <input type="text" id="chat-input" class="chat-input-field" placeholder="Fale algo...">
                <button class="chat-send-btn" onclick="sendChatMessage()">➤</button>
            </div>
        </div>
    </div>
</div>

<script>
    let currentGenderSelection = "M";
    function selectGender(g) {
        currentGenderSelection = g;
        document.querySelectorAll('.gender-selector .gender-btn').forEach(b => b.classList.remove('selected'));
        document.querySelector(`.gender-selector .gender-btn[data-gender="${g}"]`).classList.add('selected');
    }

    const CONFIG_ROUPAS_MASCULINAS = ["Boné", "Camisa", "Calça", "Meias", "Cueca"];
    const CONFIG_ROUPAS_FEMININAS = ["Acessórios", "Blusa", "Saia", "Salto Alto", "Lingerie"];
    const PRENDAS_DO_MOTEL = ["Dar um beijo estalado no pescoço! 💋", "Fazer 1 minuto de massagem! 💆", "Sussurrar uma fantasia em segredo! 🤫", "Pagar 10 agachamentos lentos! 🏋️", "Dar um selinho de 10 segundos! 🥵"];

    let playerClothes = {}, playerGenders = {}, scores = {};
    const listaJogadores = new Set();
    const FULL_PALETTE = ["#000000","#ffffff","#808080","#ff0000","#ff6600","#ffff00","#00ff00","#009900","#00ffff","#0000ff","#aa33ff","#ff00ff","#ff99cc","#663300"];

    let username = "", roomName = "", mqttClient = null, baseTopic = "";
    let isDrawer = false, currentWord = "", currentDrawerName = "";
    let roundActive = false, currentDrawerIndex = -1, countdownInterval = null, nextRoundTimeout = null, currentTimeLeft = 0;
    const TEMPO_RODADA = 60;
    let eggCooldown = false, flowerCooldown = false, slapCooldown = false, kickCooldown = false;
    let customWords = [];

    const PALAVRAS_PADRAO = ["Calcinha","Cueca","Sutiã","Chicote","Algemas","Cama de Casal","Morango","Banana","Pepino","Creme","Massagem","Censura","Vela","Espelho","Pegada","Gemido","Beijo","Chantilly","Travesseiro"];
    function getPalavras() { return customWords.length > 0 ? customWords : PALAVRAS_PADRAO; }

    let currentTool = 'brush', currentShape = 'free', currentColor = '#000000', currentBrushSize = 2;
    let startX = 0, startY = 0, drawing = false, snapshot = null, lastFormCoordinates = null;

    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const VIRTUAL_WIDTH = 800, VIRTUAL_HEIGHT = 600;

    function initCanvasResolution() { canvas.width = VIRTUAL_WIDTH; canvas.height = VIRTUAL_HEIGHT; ctx.lineCap = 'round'; ctx.lineJoin = 'round'; ctx.lineWidth = currentBrushSize; }
    initCanvasResolution();

    function getCanvasCoordinates(clientX, clientY) {
        const rect = canvas.getBoundingClientRect();
        return { x: ((clientX - rect.left) / rect.width) * canvas.width, y: ((clientY - rect.top) / rect.height) * canvas.height };
    }

    function toggleWordsPanel() { const panel = document.getElementById('words-management-panel'); panel.style.display = panel.style.display === 'flex' ? 'none' : 'flex'; }
    function submitRuntimeWords() {
        const txt = document.getElementById('runtime-new-words'); const content = txt.value.trim();
        if (!content || !mqttClient) return;
        const arr = content.split(',').map(w => w.trim()).filter(w => w.length > 0);
        if (arr.length > 0) { mqttClient.publish(baseTopic + "/customwords/add", JSON.stringify({ words: arr, sender: username })); txt.value = ""; toggleWordsPanel(); }
    }

    function setTool(tool) {
        currentTool = tool; document.querySelectorAll('#tools .tool-btn[id^="tool-"]').forEach(b => b.classList.remove('active'));
        document.getElementById('tool-' + tool).classList.add('active');
        if (tool === 'eraser') setShape('free');
    }
    function setShape(shape) { currentShape = shape; document.querySelectorAll('#tools .tool-btn[id^="shape-"]').forEach(b => b.classList.remove('active')); document.getElementById('shape-' + shape).classList.add('active'); if (currentTool === 'fill') setTool('brush'); }
    function setBrushSize(size, el) { currentBrushSize = size; document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active')); el.classList.add('active'); ctx.lineWidth = size; }
    function setActiveColor(hex) { currentColor = hex; document.getElementById('current-color-display').style.background = hex; }
    function pickCustomColor(input) { setActiveColor(input.value); }

    function buildPalette() {
        const grid = document.getElementById('palette-grid'); grid.innerHTML = "";
        FULL_PALETTE.forEach(hex => {
            const swatch = document.createElement('div'); swatch.className = 'color-swatch'; swatch.style.background = hex;
            swatch.addEventListener('click', () => { setActiveColor(hex); if (currentTool === 'eraser') setTool('brush'); });
            grid.appendChild(swatch);
        });
    }
    buildPalette();

    canvas.addEventListener('mousedown', (e) => { if (!isDrawer || !roundActive) return; e.preventDefault(); const c = getCanvasCoordinates(e.clientX, e.clientY); if (currentTool === 'fill') { doFill(Math.round(c.x), Math.round(c.y)); return; } onStartDrag(c.x, c.y); });
    canvas.addEventListener('mousemove', (e) => { if (!drawing) return; e.preventDefault(); const c = getCanvasCoordinates(e.clientX, e.clientY); onMoveDrag(c.x, c.y); });
    canvas.addEventListener('mouseup', (e) => { e.preventDefault(); onStopDrag(); });
    canvas.addEventListener('mouseleave', () => { if (drawing) onStopDrag(); });

    canvas.addEventListener('touchstart', (e) => { if (!isDrawer || !roundActive || e.touches.length !== 1) return; e.preventDefault(); const touch = e.touches[0]; const c = getCanvasCoordinates(touch.clientX, touch.clientY); if (currentTool === 'fill') { doFill(Math.round(c.x), Math.round(c.y)); return; } onStartDrag(c.x, c.y); }, { passive: false });
    canvas.addEventListener('touchmove', (e) => { if (!drawing || e.touches.length !== 1) return; e.preventDefault(); const touch = e.touches[0]; const c = getCanvasCoordinates(touch.clientX, touch.clientY); onMoveDrag(c.x, c.y); }, { passive: false });
    canvas.addEventListener('touchend', (e) => { e.preventDefault(); onStopDrag(); }, { passive: false });

    function onStartDrag(x, y) {
        drawing = true; startX = x; startY = y; const col = currentTool === 'eraser' ? '#ffffff' : currentColor;
        ctx.fillStyle = col; ctx.strokeStyle = col; ctx.lineWidth = currentBrushSize;
        if (currentShape === 'free') { ctx.beginPath(); ctx.moveTo(x, y); sendDrawData('start', x, y, col, currentBrushSize); }
        else { snapshot = ctx.getImageData(0, 0, canvas.width, canvas.height); }
    }

    function onMoveDrag(x, y) {
        if (!drawing) return; const col = currentTool === 'eraser' ? '#ffffff' : currentColor; ctx.lineWidth = currentBrushSize;
        if (currentShape === 'free') { ctx.lineTo(x, y); ctx.stroke(); sendDrawData('draw', x, y, col, currentBrushSize); }
        else if (currentShape === 'spray') { let sm = currentBrushSize; if (currentTimeLeft < 20) sm = currentBrushSize * 4; generateSpray(x, y, col, sm); sendDrawData('spray', x, y, col, sm); }
        else { if (snapshot) ctx.putImageData(snapshot, 0, 0); drawBoundingShape(currentShape, startX, startY, x, y, col, currentBrushSize); }
    }

    function onStopDrag() {
        if (!drawing) return; drawing = false;
        if (currentShape !== 'free' && currentShape !== 'spray' && lastFormCoordinates) {
            const col = currentTool === 'eraser' ? '#ffffff' : currentColor;
            sendDrawData('final_shape', lastFormCoordinates.sX, lastFormCoordinates.sY, col, currentBrushSize, lastFormCoordinates.shape, lastFormCoordinates.cX, lastFormCoordinates.cY);
        }
        snapshot = null; lastFormCoordinates = null;
    }

    function drawBoundingShape(shape, sX, sY, cX, cY, color, size) {
        ctx.strokeStyle = color; ctx.fillStyle = "transparent"; ctx.lineWidth = size; lastFormCoordinates = { shape, sX, sY, cX, cY }; ctx.beginPath();
        if (shape === 'square') ctx.strokeRect(sX, sY, cX - sX, cY - sY);
        else if (shape === 'circle') { let rx = (cX - sX) / 2, ry = (cY - sY) / 2; ctx.save(); ctx.translate(sX + rx, sY + ry); ctx.scale(Math.abs(rx), Math.abs(ry)); ctx.arc(0, 0, 1, 0, 2 * Math.PI); ctx.restore(); ctx.stroke(); }
        else if (shape === 'triangle') { ctx.moveTo(sX + (cX - sX) / 2, sY); ctx.lineTo(cX, cY); ctx.lineTo(sX, cY); ctx.closePath(); ctx.stroke(); }
    }

    function generateSpray(x, y, color, size) { ctx.fillStyle = color; for (let i = 0; i < size * 4; i++) { const a = Math.random() * Math.PI * 2, r = Math.random() * (size * 3); ctx.fillRect(x + Math.cos(a) * r, y + Math.sin(a) * r, 1, 1); } }

    function doFill(startX, startY) {
        const fillColor = currentColor; const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height); const data = imageData.data;
        const idx = (startY * canvas.width + startX) * 4; const fillR = parseInt(fillColor.slice(1,3),16), fillG = parseInt(fillColor.slice(3,5),16), fillB = parseInt(fillColor.slice(5,7),16);
        if (data[idx] === fillR && data[idx+1] === fillG && data[idx+2] === fillB) return;
        const stack = [[startX, startY]], visited = new Uint8Array(canvas.width * canvas.height), targetR = data[idx], targetG = data[idx+1], targetB = data[idx+2], targetA = data[idx+3];
        while (stack.length) {
            const [x, y] = stack.pop(); if (x < 0 || x >= canvas.width || y < 0 || y >= canvas.height) continue; const vi = y * canvas.width + x; if (visited[vi]) continue; const pi = vi * 4;
            if (Math.abs(data[pi]-targetR)>32 || Math.abs(data[pi+1]-targetG)>32 || Math.abs(data[pi+2]-targetB)>32) continue;
            visited[vi] = 1; data[pi] = fillR; data[pi+1] = fillG; data[pi+2] = fillB; data[pi+3] = 255; stack.push([x+1,y],[x-1,y],[x,y+1],[x,y-1]);
        }
        ctx.putImageData(imageData, 0, 0); sendDrawData('fill', startX, startY, fillColor, 0);
    }

    function doRemoteFill(startX, startY, fillColor) {
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height); const data = imageData.data;
        const idx = (startY * canvas.width + startX) * 4; const fillR = parseInt(fillColor.slice(1,3),16), fillG = parseInt(fillColor.slice(3,5),16), fillB = parseInt(fillColor.slice(5,7),16);
        if (data[idx] === fillR && data[idx+1] === fillG && data[idx+2] === fillB) return;
        const stack = [[startX, startY]], visited = new Uint8Array(canvas.width * canvas.height), targetR = data[idx], targetG = data[idx+1], targetB = data[idx+2], targetA = data[idx+3];
        while (stack.length) {
            const [x, y] = stack.pop(); if (x < 0 || x >= canvas.width || y < 0 || y >= canvas.height) continue; const vi = y * canvas.width + x; if (visited[vi]) continue; const pi = vi * 4;
            if (Math.abs(data[pi]-targetR)>32 || Math.abs(data[pi+1]-targetG)>32 || Math.abs(data[pi+2]-targetB)>32) continue;
            visited[vi] = 1; data[pi] = fillR; data[pi+1] = fillG; data[pi+2] = fillB; data[pi+3] = 255; stack.push([x+1,y],[x-1,y],[x,y+1],[x,y-1]);
        }
        ctx.putImageData(imageData, 0, 0);
    }

    function renderScoreboard() {
        const container = document.getElementById('players-list'); if (!container) return; container.innerHTML = "";
        Array.from(listaJogadores).sort((a,b) => (scores[b]||0) - (scores[a]||0)).forEach((nome, idx) => {
            let label = (idx+1) + "º"; if (idx===0) label = "🥇 1º"; else if (idx===1) label = "💋 2º"; else if (idx===2) label = "🍆 3º";
            const item = document.createElement('div'); item.className = "player-item"; if (nome === currentDrawerName) item.classList.add('drawing');
            const row = document.createElement('div'); row.className = "player-meta-row";
            const div = document.createElement('div'); div.style.display = 'flex'; div.style.gap = '4px';
            const rank = document.createElement('span'); rank.className = 'player-rank'; rank.innerText = label;
            const name = document.createElement('span'); name.className = 'player-name'; name.innerText = nome + (playerGenders[nome] === 'F' ? ' ♀️' : ' ♂️');
            div.appendChild(rank); div.appendChild(name);
            const score = document.createElement('span'); score.className = 'player-score'; score.innerText = scores[nome] || 0;
            row.appendChild(div); row.appendChild(score);
            const strip = document.createElement('div'); strip.className = "player-strip-inventory";
            strip.innerText = (playerClothes[nome] || []).length > 0 ? "Vestindo: " + playerClothes[nome].join(", ") : "🔞 TOTALMENTE NU(A)!";
            item.appendChild(row); item.appendChild(strip); container.appendChild(item);
        });
    }

    function triggerStripConsequence(targetPlayer) {
        if (!playerClothes[targetPlayer] || playerClothes[targetPlayer].length === 0) {
            mqttClient.publish(baseTopic + "/prenda", JSON.stringify({ player: targetPlayer, text: PRENDAS_DO_MOTEL[Math.floor(Math.random() * PRENDAS_DO_MOTEL.length)] }));
            return;
        }
        const piece = playerClothes[targetPlayer].shift();
        mqttClient.publish(baseTopic + "/strip", JSON.stringify({ player: targetPlayer, piece: piece, remaining: playerClothes[targetPlayer] }));
        showGarticAnnouncement("🔞 STRIPTEASE!", `${targetPlayer} perdeu e tirou: ${piece.toUpperCase()}! 🔥`);
    }

    function throwInteractItem(type) {
        if (!roundActive || isDrawer || !mqttClient) return;
        mqttClient.publish(baseTopic + "/interact", JSON.stringify({ thrower: username, target: currentDrawerName, type: type }));
    }

    function animateInteractThrow(thrower, target, type) {
        const canvasRect = canvas.getBoundingClientRect(); const element = document.createElement('div');
        element.className = 'egg-fly'; element.textContent = type === 'egg' ? '🍆' : (type === 'flower' ? '🍑' : (type === 'slap' ? '👋' : '👟'));
        element.style.left = '50%'; element.style.top = '90%'; element.style.setProperty('--tx', '0px'); element.style.setProperty('--ty', '-300px'); element.style.setProperty('--tx2', '0px'); element.style.setProperty('--rot', '0deg');
        document.body.appendChild(element);
        setTimeout(() => {
            element.remove(); if (target !== username) return;
            if (type === 'egg') {
                const over = document.getElementById('egg-overlay'); over.classList.add('splat'); setTimeout(() => over.classList.remove('splat'), 1500);
            } else if (type === 'slap' && isDrawer && roundActive) {
                currentTimeLeft = Math.max(1, currentTimeLeft - 5);
            } else if (type === 'kick' && isDrawer && roundActive) {
                setActiveColor('#000000'); currentBrushSize = 2;
                addSystemMessage("⚠️ O CHUTE resetou seu pincel pro preto fino!");
            }
        }, 900);
    }

    function skipRound() { if (roundActive && isDrawer && mqttClient) mqttClient.publish(baseTopic + "/gameflow/skip", JSON.stringify({ drawer: username, word: currentWord })); }

    function connectToGame() {
        username = document.getElementById('input-username').value.trim(); roomName = document.getElementById('input-room').value.trim().toLowerCase().replace(/[^a-z0-9]/g,"");
        if (!username || !roomName) { alert("Preencha os campos!"); return; }
        playerGenders[username] = currentGenderSelection; playerClothes[username] = currentGenderSelection === "F" ? [...CONFIG_ROUPAS_FEMININAS] : [...CONFIG_ROUPAS_MASCULINAS];
        const customInput = document.getElementById('input-custom-words').value.trim(); if (customInput) customWords = customInput.split(',').map(w => w.trim()).filter(w => w.length > 0);
        document.getElementById('login-screen').style.display = 'none'; document.getElementById('room-id').innerText = "Motel: " + roomName;
        listaJogadores.add(username); initMqtt();
    }

    function initMqtt() {
        baseTopic = "gartic_clone_free_2026/" + roomName; mqttClient = mqtt.connect('wss://broker.hivemq.com:8884/mqtt');
        mqttClient.on('connect', () => {
            mqttClient.subscribe(baseTopic + "/#");
            const identity = JSON.stringify({ sender: "Sistema", text: `📢 ${username} entrou na cama.`, name: username, gender: currentGenderSelection, clothes: playerClothes[username], type: "system" });
            mqttClient.publish(baseTopic + "/chat", identity); mqttClient.publish(baseTopic + "/presence", identity);
            mqttClient.publish(baseTopic + "/sync/request", JSON.stringify({ requester: username }));
            setTimeout(() => { checkAndAutoStart(); }, 2000);
        });

        mqttClient.on('message', (topic, message) => {
            const data = JSON.parse(message.toString());
            if (topic === baseTopic + "/chat") {
                if (data.type === "system") {
                    addSystemMessage(data.text);
                    if (data.name) { playerGenders[data.name] = data.gender; playerClothes[data.name] = data.clothes; listaJogadores.add(data.name); renderScoreboard(); checkAndAutoStart(); }
                } else if (data.type === "guess") {
                    if (data.isCorrect) {
                        addSuccessMessage(data.sender, data.text); addScore(data.sender, data.pts || 5);
                        if (currentDrawerName && currentDrawerName !== data.sender) { addScore(currentDrawerName, 3); triggerStripConsequence(currentDrawerName); }
                        handleRoundEndAutomatically();
                    } else { renderWrongGuessMessage(data.sender, data.text); }
                } else { renderNormalMessage(data.sender, data.text); }
            } else if (topic === baseTopic + "/draw" && !isDrawer) {
                renderRemoteDraw(data);
            } else if (topic === baseTopic + "/presence" && data.name !== username) {
                playerGenders[data.name] = data.gender; playerClothes[data.name] = data.clothes; listaJogadores.add(data.name);
                mqttClient.publish(baseTopic + "/presence/echo", JSON.stringify({ name: username, gender: currentGenderSelection, clothes: playerClothes[username] }));
                renderScoreboard(); checkAndAutoStart();
            } else if (topic === baseTopic + "/presence/echo" && data.name !== username) {
                playerGenders[data.name] = data.gender; playerClothes[data.name] = data.clothes; listaJogadores.add(data.name); renderScoreboard(); checkAndAutoStart();
            } else if (topic === baseTopic + "/gameflow") {
                handleGameFlow(data);
            } else if (topic === baseTopic + "/gameflow/skip") {
                showGarticAnnouncement("⏭️ BROCHOU!", `${data.drawer} passou a vez! Era: ${data.word.toUpperCase()}`);
                if (currentDrawerName) triggerStripConsequence(currentDrawerName);
                handleRoundEndAutomatically();
            } else if (topic === baseTopic + "/interact") {
                animateInteractThrow(data.thrower, data.target, data.type);
            } else if (topic === baseTopic + "/strip") {
                playerClothes[data.player] = data.remaining; addSystemMessage(`🔞 PEÇA REMOVIDA: ${data.player} retirou ${data.piece}!`); renderScoreboard();
            } else if (topic === baseTopic + "/prenda") {
                addSystemMessage(`🔥 PRENDA: ${data.player} deve pagar: ${data.text}`);
            } else if (topic === baseTopic + "/sync/request" && data.requester !== username) {
                mqttClient.publish(baseTopic + "/sync/response", JSON.stringify({ target: data.requester, sender: username, gender: currentGenderSelection, clothes: playerClothes[username], score: scores[username] || 0 }));
            } else if (topic === baseTopic + "/sync/response" && data.target === username) {
                playerGenders[data.sender] = data.gender; playerClothes[data.sender] = data.clothes; scores[data.sender] = data.score; listaJogadores.add(data.sender); renderScoreboard();
            }
        });
    }

    function checkAndAutoStart() { if (!roundActive && currentDrawerName === "" && listaJogadores.size > 1) { if (Array.from(listaJogadores)[0] === username) drawNewRound(); } }
    function drawNewRound() {
        const arr = Array.from(listaJogadores); if (arr.length === 0) return; currentDrawerIndex = (currentDrawerIndex + 1) % arr.length;
        mqttClient.publish(baseTopic + "/gameflow", JSON.stringify({ drawer: arr[currentDrawerIndex], word: getPalavras()[Math.floor(Math.random() * getPalavras().length)], currentIndex: currentDrawerIndex }));
    }

    function handleGameFlow(data) {
        currentDrawerName = data.drawer; currentWord = data.word; currentDrawerIndex = data.currentIndex; roundActive = true; currentTimeLeft = TEMPO_RODADA;
        ctx.clearRect(0, 0, canvas.width, canvas.height); renderScoreboard();
        const eggBtn = document.getElementById('btn-egg'), flowerBtn = document.getElementById('btn-flower'), slapBtn = document.getElementById('btn-slap'), kickBtn = document.getElementById('btn-kick'), skipBtn = document.getElementById('btn-skip');
        if (currentDrawerName === username) {
            isDrawer = true; eggBtn.style.display = 'none'; flowerBtn.style.display = 'none'; slapBtn.style.display = 'none'; kickBtn.style.display = 'none'; skipBtn.style.display = 'inline-flex';
            document.getElementById('word-display').innerText = "✏️ Seu Fetiche Secreto: " + currentWord.toUpperCase();
        } else {
            isDrawer = false; skipBtn.style.display = 'none'; eggBtn.style.display = 'inline-flex'; flowerBtn.style.display = 'inline-flex'; slapBtn.style.display = 'inline-flex'; kickBtn.style.display = 'inline-flex';
            document.getElementById('word-display').innerText = `🎨 Esfregando pincel: ${currentDrawerName} (${"_ ".repeat(currentWord.length).trim()})`;
        }
        clearInterval(countdownInterval); countdownInterval = setInterval(() => {
            currentTimeLeft--; document.getElementById('timer-display').innerText = "⏱️ Clímax: " + currentTimeLeft + "s";
            if (currentTimeLeft <= 0) { clearInterval(countdownInterval); if (currentDrawerName) triggerStripConsequence(currentDrawerName); handleRoundEndAutomatically(); }
        }, 1000);
    }

    function handleRoundEndAutomatically() { roundActive = false; clearInterval(countdownInterval); if (currentDrawerName === username) nextRoundTimeout = setTimeout(() => { drawNewRound(); }, 4000); }
    function sendDrawData(action, x, y, color, size, shapeType = '', endX = 0, endY = 0) { if (mqttClient && roundActive) mqttClient.publish(baseTopic + "/draw", JSON.stringify({ action, x, y, color, size, shapeType, endX, endY })); }
    function sendClear() { if (isDrawer) { ctx.clearRect(0, 0, canvas.width, canvas.height); mqttClient.publish(baseTopic + "/draw", JSON.stringify({ action: 'clear' })); } }

    function sendGuessMessage() {
        const input = document.getElementById('guess-input'); const msg = input.value.trim(); if (!msg || isDrawer) return;
        if (msg.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"") === currentWord.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"")) {
            mqttClient.publish(baseTopic + "/chat", JSON.stringify({ sender: username, text: `Acertou o fetiche! 🎯`, isCorrect: true, pts: calcPoints(currentTimeLeft), type: "guess" }));
        } else {
            mqttClient.publish(baseTopic + "/chat", JSON.stringify({ sender: username, text: msg, isCorrect: false, type: "guess" }));
        }
        input.value = "";
    }
    function sendChatMessage() { const input = document.getElementById('chat-input'); if (input.value.trim()) { mqttClient.publish(baseTopic + "/chat", JSON.stringify({ sender: username, text: input.value.trim(), type: "talk" })); input.value = ""; } }

    function addScore(nome, pts) { scores[nome] = (scores[nome] || 0) + pts; renderScoreboard(); }
    function showGarticAnnouncement(title, desc) { const box = document.getElementById('round-announcement'); document.getElementById('announcement-title').innerText = title; document.getElementById('announcement-desc').innerText = desc; box.classList.add('show'); setTimeout(() => box.classList.remove('show'), 3200); }
    function addSystemMessage(t) { const c = document.getElementById('guess-messages'); const m = document.createElement('div'); m.className = "msg msg-system"; m.innerText = t; c.appendChild(m); c.scrollTop = c.scrollHeight; }
    function addSuccessMessage(s, t) { const c = document.getElementById('guess-messages'); const m = document.createElement('div'); m.className = "msg msg-success"; m.innerText = `🎯 ${s} ${t}`; c.appendChild(m); c.scrollTop = c.scrollHeight; }
    function renderWrongGuessMessage(s, t) { const c = document.getElementById('guess-messages'); const m = document.createElement('div'); m.className = "msg msg-wrong"; m.innerText = `${s}: ${t}`; c.appendChild(m); c.scrollTop = c.scrollHeight; }
    function renderNormalMessage(s, t) { const c = document.getElementById('chat-messages'); const m = document.createElement('div'); m.className = "msg msg-normal"; m.innerHTML = `<span class="username">${s}:</span> ${t}`; c.appendChild(m); c.scrollTop = c.scrollHeight; }
</script>
