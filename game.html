<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gartic Clone Realtime</title>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #ffd43b;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            padding: 10px;
            overscroll-behavior: none;
            overflow: hidden;
        }

        /* Tela de Login */
        #login-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #ffd43b;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .login-box {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .login-box h2 {
            color: #118ab2;
            margin-bottom: 20px;
        }

        .login-box input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 2px solid #ced4da;
            border-radius: 8px;
            outline: none;
            font-size: 16px;
        }

        .login-box input:focus {
            border-color: #118ab2;
        }

        /* Estrutura Principal */
        header {
            text-align: center;
            margin-bottom: 10px;
            background: white;
            padding: 10px 20px;
            border-radius: 50px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 1200px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 {
            color: #118ab2;
            font-size: 20px;
        }

        #word-display {
            font-weight: bold;
            font-size: 18px;
            color: #ef476f;
            background: #f8f9fa;
            padding: 5px 15px;
            border-radius: 20px;
            border: 2px dashed #ef476f;
        }

        #room-display {
            font-weight: bold;
            color: #666;
            font-size: 12px;
        }

        #main-container {
            display: flex;
            width: 100%;
            max-width: 1200px;
            flex: 1;
            height: calc(100vh - 70px);
            gap: 10px;
        }

        /* Painel Lateral de Jogadores */
        #scoreboard {
            flex: 1;
            background: white;
            border-radius: 15px;
            padding: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #players-list {
            margin-top: 10px;
            overflow-y: auto;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .player-item {
            background: #f8f9fa;
            padding: 8px;
            border-radius: 6px;
            font-weight: bold;
            color: #333;
            font-size: 13px;
            border-left: 4px solid #118ab2;
            display: flex;
            justify-content: space-between;
        }

        .player-item.drawing {
            border-left-color: #ef476f;
            background: #ffe3e8;
        }

        /* Painel de Desenho */
        #canvas-container {
            flex: 3;
            background: white;
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        canvas {
            flex: 1;
            background: #ffffff;
            cursor: crosshair;
            touch-action: none; 
        }

        #tools {
            height: 60px;
            background: #e9ecef;
            display: flex;
            align-items: center;
            padding: 0 10px;
            gap: 10px;
            border-top: 2px solid #dee2e6;
            overflow-x: auto;
        }

        .color-circle {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
            flex-shrink: 0;
        }

        .color-circle.active {
            border-color: #000;
        }

        .btn {
            padding: 8px 12px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 13px;
            flex-shrink: 0;
        }

        .btn-clear { background: #ef476f; color: white; }
        .btn-start-game { background: #118ab2; color: white; }

        /* Painel do Chat */
        #chat-container {
            flex: 1.5;
            background: white;
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #chat-messages {
            flex: 1;
            padding: 12px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .msg {
            padding: 6px 10px;
            border-radius: 5px;
            font-size: 13px;
            word-break: break-all;
        }

        .msg-system { background: #e2f0d9; color: #385723; font-weight: bold; }
        .msg-success { background: #d1e7dd; color: #0f5132; font-weight: bold; border: 1px solid #badbcc; }
        .msg-normal { background: #f1f3f5; color: #333; }
        .msg-normal .username { font-weight: bold; color: #118ab2; }

        #chat-input-area {
            display: flex;
            padding: 8px;
            border-top: 2px solid #dee2e6;
            background: #f8f9fa;
        }

        #chat-input {
            flex: 1;
            padding: 8px;
            border: 2px solid #ced4da;
            border-radius: 5px;
            outline: none;
            font-size: 14px;
        }

        #btn-send {
            background: #118ab2;
            color: white;
            margin-left: 6px;
        }

        @media (max-width: 768px) {
            body { padding: 5px; }
            header { padding: 8px 15px; margin-bottom: 5px; }
            h1 { font-size: 14px; }
            #word-display { font-size: 14px; padding: 3px 10px; }
            #main-container {
                flex-direction: column;
                height: calc(100vh - 55px);
                gap: 5px;
            }
            #canvas-container { flex: 2; height: 42vh; }
            #chat-container { flex: 1.5; height: 35vh; }
            #scoreboard { display: none; }
        }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h2>Gartic Clone Realtime</h2>
            <input type="text" id="input-username" placeholder="Seu Nome / Apelido" required>
            <input type="text" id="input-room" placeholder="Nome da Sala (ex: sala123)" required>
            <button class="btn btn-draw" style="width: 100%; padding: 12px; font-size: 16px;" onclick="connectToGame()">ENTRAR NO JOGO</button>
        </div>
    </div>

    <header>
        <h1>GARTIC</h1>
        <div id="word-display">Aguardando rodada...</div>
        <div id="room-display">Sala: Não conectado</div>
    </header>

    <div id="main-container">
        <div id="scoreboard">
            <h3 style="color: #555; padding-bottom: 5px; border-bottom: 2px solid #f1f3f5;">Jogadores na Sala:</h3>
            <div id="players-list"></div>
        </div>

        <div id="canvas-container">
            <canvas id="canvas"></canvas>
            <div id="tools">
                <div class="color-circle active" style="background: #000000;" onclick="changeColor('#000000', this)"></div>
                <div class="color-circle" style="background: #ef476f;" onclick="changeColor('#ef476f', this)"></div>
                <div class="color-circle" style="background: #ffd166;" onclick="changeColor('#ffd166', this)"></div>
                <div class="color-circle" style="background: #06d6a0;" onclick="changeColor('#06d6a0', this)"></div>
                <div class="color-circle" style="background: #118ab2;" onclick="changeColor('#118ab2', this)"></div>
                <button class="btn btn-clear" onclick="sendClear()">Limpar</button>
                <button class="btn btn-start-game" onclick="drawNewRound()" style="margin-left: auto;">Nova Rodada 🎲</button>
            </div>
        </div>

        <div id="chat-container">
            <div id="chat-messages"></div>
            <div id="chat-input-area">
                <input type="text" id="chat-input" placeholder="Digite seu palpite aqui..." autocomplete="off">
                <button id="btn-send" class="btn" onclick="sendChatMessage()">Enviar</button>
            </div>
        </div>
    </div>

    <script>
        let username = "";
        let roomName = "";
        let mqttClient = null;
        let baseTopic = "";
        const listaJogadores = new Set();

        // Variáveis do Estado do Jogo
        let isDrawer = false;
        let currentWord = "";
        let currentDrawerName = "";
        let roundActive = false;

        const PALAVRAS = ["Cachorro", "Gato", "Carro", "Aviao", "Banana", "Maca", "Casa", "Arvore", "Bola", "Computador", "Celular", "Caneta", "Chave", "Livro", "Relogio", "Cadeira", "Garfo", "Sapato", "Oculos", "Sol", "Lua", "Flor", "Peixe", "Passaro"];

        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let drawing = false;
        let currentColor = '#000000';

        function resizeCanvas() {
            canvas.width = canvas.clientWidth;
            canvas.height = canvas.clientHeight;
            ctx.lineCap = 'round';
            ctx.lineWidth = 4;
        }

        window.addEventListener('resize', resizeCanvas);

        // Eventos de Mouse
        canvas.addEventListener('mousedown', (e) => startDrawing(e.clientX, e.clientY));
        canvas.addEventListener('mousemove', (e) => draw(e.clientX, e.clientY));
        canvas.addEventListener('mouseup', stopDrawing);
        canvas.addEventListener('mouseout', stopDrawing);

        // Eventos de Touch (Celular)
        canvas.addEventListener('touchstart', (e) => { 
            if (e.touches.length === 1) startDrawing(e.touches[0].clientX, e.touches[0].clientY);
        }, { passive: false });

        canvas.addEventListener('touchmove', (e) => { 
            if (e.touches.length === 1) draw(e.touches[0].clientX, e.touches[0].clientY);
        }, { passive: false });

        canvas.addEventListener('touchend', stopDrawing);

        function startDrawing(clientX, clientY) {
            if (!isDrawer || !roundActive) return;
            drawing = true;
            const rect = canvas.getBoundingClientRect();
            const x = clientX - rect.left;
            const y = clientY - rect.top;
            ctx.beginPath();
            ctx.moveTo(x, y);
            sendDrawData('start', x, y, currentColor);
        }

        function draw(clientX, clientY) {
            if (!drawing || !isDrawer || !roundActive) return;
            const rect = canvas.getBoundingClientRect();
            const x = clientX - rect.left;
            const y = clientY - rect.top;
            ctx.strokeStyle = currentColor;
            ctx.lineTo(x, y);
            ctx.stroke();
            sendDrawData('draw', x, y, currentColor);
        }

        function stopDrawing() {
            if (!isDrawer) return;
            drawing = false;
            sendDrawData('stop', 0, 0, currentColor);
        }

        function changeColor(color, element) {
            currentColor = color;
            document.querySelectorAll('.color-circle').forEach(el => el.classList.remove('active'));
            element.classList.add('active');
        }

        function connectToGame() {
            username = document.getElementById('input-username').value.trim();
            roomName = document.getElementById('input-room').value.trim().toLowerCase().replace(/[^a-z0-9]/g, "");

            if (!username || !roomName) {
                alert("Por favor, digite seu nome e o nome da sala!");
                return;
            }

            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('room-display').innerText = "Sala: " + roomName;
            
            setTimeout(() => { resizeCanvas(); }, 100);

            adicionarJogadorLista(username);
            initMqtt();
        }

        function initMqtt() {
            baseTopic = "gartic_clone_free_2026/" + roomName;
            mqttClient = mqtt.connect('wss://broker.hivemq.com:8884/mqtt');

            mqttClient.on('connect', () => {
                mqttClient.subscribe(baseTopic + "/chat");
                mqttClient.subscribe(baseTopic + "/draw");
                mqttClient.subscribe(baseTopic + "/presence");
                mqttClient.subscribe(baseTopic + "/presence/echo");
                mqttClient.subscribe(baseTopic + "/gameflow");

                const identityPayload = JSON.stringify({ sender: "Sistema", text: `${username} entrou na sala.`, name: username });
                mqttClient.publish(baseTopic + "/chat", identityPayload);
                mqttClient.publish(baseTopic + "/presence", identityPayload);
            });

            mqttClient.on('message', (topic, message) => {
                const data = JSON.parse(message.toString());

                if (topic === baseTopic + "/chat") {
                    if (data.sender === "Sistema") {
                        addSystemMessage(data.text);
                        if (data.name) adicionarJogadorLista(data.name);
                    } else if (data.isCorrect) {
                        addSuccessMessage(data.sender, data.text);
                    } else {
                        renderNormalMessage(data.sender, data.text);
                    }
                } else if (topic === baseTopic + "/draw" && !isDrawer) {
                    renderRemoteDraw(data);
                } else if (topic === baseTopic + "/presence") {
                    if (data.name && data.name !== username) {
                        adicionarJogadorLista(data.name);
                        mqttClient.publish(baseTopic + "/presence/echo", JSON.stringify({ name: username }));
                    }
                } else if (topic === baseTopic + "/presence/echo") {
                    if (data.name && data.name !== username) adicionarJogadorLista(data.name);
                } else if (topic === baseTopic + "/gameflow") {
                    handleGameFlow(data);
                }
            });
        }

        // Lógica de Sorteio e Controle de Turnos
        function drawNewRound() {
            if (!mqttClient) return;
            const playersArr = Array.from(listaJogadores);
            if (playersArr.length === 0) return;

            // Escolhe um desenhista e uma palavra aleatória do array
            const randomDrawer = playersArr[Math.floor(Math.random() * playersArr.length)];
            const randomWord = PALAVRAS[Math.floor(Math.random() * PALAVRAS.length)];

            const flowPayload = JSON.stringify({
                drawer: randomDrawer,
                word: randomWord
            });

            mqttClient.publish(baseTopic + "/gameflow", flowPayload);
        }

        function handleGameFlow(data) {
            currentDrawerName = data.drawer;
            currentWord = data.word;
            roundActive = true;

            // Limpa o canvas automaticamente para a nova rodada
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Atualiza a UI visual dos nomes na lista lateral
            document.querySelectorAll('.player-item').forEach(el => el.classList.remove('drawing'));
            const drawerEl = document.getElementById("p-" + currentDrawerName.replace(/\s+/g, '-'));
            if (drawerEl) drawerEl.classList.add('drawing');

            if (currentDrawerName === username) {
                isDrawer = true;
                document.getElementById('word-display').innerText = "Sua Palavra: " + currentWord.toUpperCase();
                addSystemMessage(`Sua vez de desenhar! Palavra: ${currentWord.toUpperCase()}`);
            } else {
                isDrawer = false;
                // Exibe traços equivalentes ao tamanho da palavra secreta para os adivinhadores
                let underscores = "_ ".repeat(currentWord.length).trim();
                document.getElementById('word-display').innerText = "Desenho de " + currentDrawerName + " (" + underscores + ")";
                addSystemMessage(`${currentDrawerName} está desenhando... tente adivinhar!`);
            }
        }

        function adicionarJogadorLista(nome) {
            if (listaJogadores.has(nome)) return;
            listaJogadores.add(nome);

            const container = document.getElementById('players-list');
            if (!container) return;
            const item = document.createElement('div');
            item.className = "player-item";
            item.id = "p-" + nome.replace(/\s+/g, '-');
            item.innerText = nome;
            container.appendChild(item);
        }

        function sendDrawData(action, x, y, color) {
            if (!mqttClient) return;
            const payload = JSON.stringify({ action, x, y, color });
            mqttClient.publish(baseTopic + "/draw", payload);
        }

        function renderRemoteDraw(data) {
            ctx.strokeStyle = data.color;
            if (data.action === 'start') {
                ctx.beginPath();
                ctx.moveTo(data.x, data.y);
            } else if (data.action === 'draw') {
                ctx.lineTo(data.x, data.y);
                ctx.stroke();
            } else if (data.action === 'clear') {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
            }
        }

        function sendClear() {
            if (!isDrawer) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (mqttClient) mqttClient.publish(baseTopic + "/draw", JSON.stringify({ action: 'clear' }));
        }

        function sendChatMessage() {
            const input = document.getElementById('chat-input');
            const msgText = input.value.trim();
            if (!msgText || !mqttClient) return;

            // Tratamento básico para comparar strings sem caixa alta e espaços sobressalentes
            const palpiteLimpo = msgText.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
            const respostaLimpa = currentWord.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");

            if (roundActive && !isDrawer && palpiteLimpo === respostaLimpa) {
                // Notifica a sala inteira que houve um acerto
                const payload = JSON.stringify({ 
                    sender: username, 
                    text: `Acertou a palavra secreta: ${currentWord.toUpperCase()}! 🎯`, 
                    isCorrect: true 
                });
                mqttClient.publish(baseTopic + "/chat", payload);
                
                // Encerra a rodada atual
                roundActive = false;
            } else {
                const payload = JSON.stringify({ sender: username, text: msgText, isCorrect: false });
                mqttClient.publish(baseTopic + "/chat", payload);
            }
            input.value = "";
        }

        document.getElementById('chat-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') sendChatMessage();
        });

        function addSystemMessage(text) {
            const chatMessages = document.getElementById('chat-messages');
            const m = document.createElement('div');
            m.className = "msg msg-system";
            m.innerText = text;
            chatMessages.appendChild(m);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function addSuccessMessage(sender, text) {
            const chatMessages = document.getElementById('chat-messages');
            const m = document.createElement('div');
            m.className = "msg msg-success";
            m.innerText = `${sender} ${text}`;
            chatMessages.appendChild(m);
            chatMessages.scrollTop = chatMessages.scrollHeight;
            document.getElementById('word-display').innerText = "Adivinhado! Aguarde a nova rodada.";
        }

        function renderNormalMessage(sender, text) {
            const chatMessages = document.getElementById('chat-messages');
            const m = document.createElement('div');
            m.className = "msg msg-normal";
            
            const spanName = document.createElement('span');
            spanName.className = "username";
            spanName.innerText = sender + ": ";

            m.appendChild(spanName);
            m.appendChild(document.createTextNode(text));
            chatMessages.appendChild(m);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }
    </script>
</body>
</html>
