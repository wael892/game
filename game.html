<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xadrez Simples</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: monospace; }
        body { padding: 10px; background: #f4f4f4; color: #333; display: flex; flex-direction: column; align-items: center; }
        
        #status { font-size: 12px; font-weight: bold; margin-bottom: 8px; text-transform: uppercase; background: #fff; padding: 4px 8px; border: 1px solid #ccc; }
        
        .tabuleiro { display: grid; grid-template-columns: repeat(8, 40px); grid-template-rows: repeat(8, 40px); border: 2px solid #333; }
        
        .casa { width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; font-size: 28px; cursor: pointer; user-select: none; }
        
        .branca { background-color: #f0d9b5; }
        .preta { background-color: #b58863; }
        
        .selecionada { background-color: #7fffd4 !important; }
        .destino-valido { background-color: #98fb98 !important; }
    </style>
</head>
<body>

<div id="status">Turno: Brancas (Selecione uma peГ§a)</div>
<div class="tabuleiro" id="tabuleiro"></div>

<script>
    // RepresentaГ§ГЈo inicial do tabuleiro (MaiГәsculas = Brancas, MinГәsculas = Pretas)
    // T/t = Torre, C/c = Cavalo, B/b = Bispo, D/d = Dama, R/r = Rei, P/p = PeГЈo, '.' = Vazio
    let tabuleiro = [
        ['t','c','b','d','r','b','c','t'],
        ['p','p','p','p','p','p','p','p'],
        ['.','.','.','.','.','.','.','.'],
        ['.','.','.','.','.','.','.','.'],
        ['.','.','.','.','.','.','.','.'],
        ['.','.','.','.','.','.','.','.'],
        ['P','P','P','P','P','P','P','P'],
        ['T','C','B','D','R','B','C','T']
    ];

    const pecasUnicode = {
        't': 'вҷң', 'c': 'вҷһ', 'b': 'вҷқ', 'd': 'вҷӣ', 'r': 'вҷҡ', 'p': 'вҷҹ',
        'T': 'вҷ–', 'C': 'вҷҳ', 'B': 'вҷ—', 'D': 'вҷ•', 'R': 'вҷ”', 'P': 'вҷҷ',
        '.': ''
    };

    let turno = 'B'; // 'B' para Brancas, 'P' para Pretas
    let casaSelecionada = null;

    function criarTabuleiro() {
        const divTabuleiro = document.getElementById('tabuleiro');
        divTabuleiro.innerHTML = '';

        for (let r = 0; r < 8; r++) {
            for (let c = 0; c < 8; c++) {
                const casa = document.createElement('div');
                casa.classList.add('casa');
                casa.classList.add((r + c) % 2 === 0 ? 'branca' : 'preta');
                casa.dataset.row = r;
                casa.dataset.col = c;
                casa.innerText = pecasUnicode[tabuleiro[r][c]];

                casa.addEventListener('click', () => clicarCasa(r, c));
                divTabuleiro.appendChild(casa);
            }
        }
    }

    function clicarCasa(r, c) {
        const peca = tabuleiro[r][c];
        
        // Se jГЎ tem uma peГ§a selecionada e clicou em um movimento vГЎlido (qualquer casa diferente por enquanto nesta versГЈo simples)
        if (casaSelecionada) {
            if (casaSelecionada.r === r && casaSelecionada.c === c) {
                // Cancelar seleГ§ГЈo ao clicar na mesma peГ§a
                casaSelecionada = null;
                atualizarInterface();
                return;
            }

            // Realiza o movimento simples (sem validaГ§ГЈo complexa de regras de xadrez)
            tabuleiro[r][c] = tabuleiro[casaSelecionada.r][casaSelecionada.c];
            tabuleiro[casaSelecionada.r][casaSelecionada.c] = '.';
            
            // Alterna o turno
            turno = turno === 'B' ? 'P' : 'B';
            casaSelecionada = null;
            atualizarInterface();
            return;
        }

        // Selecionar uma peГ§a do turno atual
        if (peca !== '.') {
            const ehMaiuscula = peca === peca.toUpperCase();
            if ((turno === 'B' && ehMaiuscula) || (turno === 'P' && !ehMaiuscula)) {
                casaSelecionada = { r, c };
                atualizarInterface();
                destacarCasaSelecionada(r, c);
            }
        }
    }

    function destacarCasaSelecionada(r, c) {
        const index = r * 8 + c;
        const casas = document.querySelectorAll('.casa');
        casas[index].classList.add('selecionada');
    }

    function atualizarInterface() {
        criarTabuleiro();
        document.getElementById('status').innerText = `Turno: ${turno === 'B' ? 'Brancas' : 'Pretas'} ${casaSelecionada ? '(Escolha o destino)' : '(Selecione uma peГ§a)'}`;
    }

    // Inicializa o jogo
    criarTabuleiro();
</script>

</body>
</html>
