<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hyper-Pulse</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #0a0a0c;
            color: #fff;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            user-select: none;
        }
        #game-container {
            position: relative;
            width: 100%;
            max-width: 400px;
            height: 100vh;
            max-height: 700px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
        }
        #ui-top {
            text-align: center;
            z-index: 10;
        }
        #score-label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #666;
        }
        #score {
            font-size: 48px;
            font-weight: 800;
            color: #00ffcc;
            text-shadow: 0 0 20px rgba(0, 255, 204, 0.5);
        }
        #high-score {
            font-size: 14px;
            color: #444;
            margin-top: 5px;
        }
        #canvas-container {
            position: relative;
            width: 300px;
            height: 300px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #target-ring {
            width: 80px;
            height: 80px;
            border: 4px solid #00ffcc;
            border-radius: 50%;
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.3);
            transition: transform 0.1s ease;
        }
        .pulse {
            transform: scale(1.1);
            background-color: rgba(0, 255, 204, 0.2);
        }
        .flash-hit {
            animation: flashHit 0.2s ease-out;
        }
        .flash-miss {
            animation: flashMiss 0.2s ease-out;
        }
        @keyframes flashHit {
            0% { background-color: rgba(0, 255, 204, 0.6); }
            100% { background-color: transparent; }
        }
        @keyframes flashMiss {
            0% { background-color: rgba(255, 0, 85, 0.4); border-color: #ff0055; }
            100% { border-color: #00ffcc; }
        }
        #incoming-ring {
            position: absolute;
            border: 2px solid #ff0055;
            border-radius: 50%;
            opacity: 0;
            pointer-events: none;
        }
        #screen-flash {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 1;
            opacity: 0;
        }
        .perfect-flash {
            animation: screenFlashAnim 0.3s ease-out;
        }
        @keyframes screenFlashAnim {
            0% { opacity: 0.3; background-color: #00ffcc; }
            100% { opacity: 0; background-color: transparent; }
        }
        #menu {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(10, 10, 12, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 20;
            padding: 20px;
            text-align: center;
        }
        #menu h1 {
            font-size: 32px;
            font-weight: 900;
            letter-spacing: 4px;
            margin-bottom: 10px;
            color: #fff;
        }
        #menu p {
            color: #666;
            font-size: 14px;
            margin-bottom: 40px;
            max-width: 250px;
            line-height: 1.4;
        }
        .btn {
            background: #00ffcc;
            color: #0a0a0c;
            border: none;
            padding: 15px 40px;
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 1px;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(0, 255, 204, 0.4);
            transition: transform 0.1s, box-shadow 0.1s;
        }
        .btn:active {
            transform: scale(0.95);
            box-shadow: 0 5px 15px rgba(0, 255, 204, 0.2);
        }
        #feedback {
            font-size: 18px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            height: 24px;
            color: #666;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div id="screen-flash"></div>

    <div id="game-container">
        <div id="ui-top">
            <div id="score-label">Score</div>
            <div id="score">0</div>
            <div id="high-score">BEST: 0</div>
        </div>

        <div id="canvas-container">
            <div id="target-ring"></div>
            <div id="incoming-ring"></div>
        </div>

        <div id="feedback"></div>
    </div>

    <div id="menu">
        <h1 id="menu-title">HYPER-PULSE</h1>
        <p id="menu-desc">Clique ou use ESPAÇO no momento exato em que o anel externo encontrar o centro.</p>
        <button class="btn" id="start-btn">JOGAR</button>
    </div>

    <script>
        const targetRing = document.getElementById('target-ring');
        const incomingRing = document.getElementById('incoming-ring');
        const scoreDisplay = document.getElementById('score');
        const highScoreDisplay = document.getElementById('high-score');
        const feedbackDisplay = document.getElementById('feedback');
        const screenFlash = document.getElementById('screen-flash');
        const startBtn = document.getElementById('start-btn');
        const menu = document.getElementById('menu');
        const menuTitle = document.getElementById('menu-title');
        const menuDesc = document.getElementById('menu-desc');

        let score = 0;
        let highScore = localStorage.getItem('hyper_pulse_highscore') || 0;
        let isPlaying = false;
        
        let currentScale = 4.0;
        let baseSpeed = 0.04;
        let speedMultiplier = 1.0;
        let animationId = null;
        let hasInteractedThisCycle = false;

        highScoreDisplay.textContent = `BEST: ${highScore}`;

        function initGame() {
            score = 0;
            speedMultiplier = 1.0;
            scoreDisplay.textContent = score;
            feedbackDisplay.textContent = '';
            feedbackDisplay.style.color = '#666';
            resetRing();
            isPlaying = true;
            menu.style.display = 'none';
            gameLoop();
        }

        function resetRing() {
            currentScale = 4.0;
            hasInteractedThisCycle = false;
            incomingRing.style.opacity = '0';
            
            // Adiciona uma leve variação aleatória na velocidade a cada ciclo para quebrar a previsibilidade mecânica pura
            speedMultiplier = 1.0 + (score * 0.04) + (Math.random() * 0.05);
        }

        function gameLoop() {
            if (!isPlaying) return;

            // Reduz o tamanho do anel externo baseado na velocidade atual
            currentScale -= baseSpeed * speedMultiplier;
            
            if (currentScale > 0.3) {
                incomingRing.style.opacity = '1';
                incomingRing.style.transform = `scale(${currentScale})`;
                
                // Mudança dinâmica de cor baseada na proximidade (Dopamina/Urgência)
                if (currentScale > 1.2) {
                    incomingRing.style.borderColor = '#ff0055';
                } else if (currentScale >= 0.9 && currentScale <= 1.1) {
                    incomingRing.style.borderColor = '#00ffcc'; // Janela perfeita
                } else {
                    incomingRing.style.borderColor = '#ffcc00';
                }
            }

            // Se passou do ponto limite sem o jogador clicar, perde o combo
            if (currentScale <= 0.5 && !hasInteractedThisCycle) {
                triggerGameOver('MUITO TARDE!');
                return;
            }

            animationId = requestAnimationFrame(gameLoop);
        }

        function handleAction() {
            if (!isPlaying || hasInteractedThisCycle) return;
            hasInteractedThisCycle = true;

            // Alvo ideal é quando a escala está próxima de 1.0 (tamanho do círculo central)
            const accuracy = Math.abs(currentScale - 1.0);

            if (accuracy <= 0.12) {
                // Acerto Perfeito
                score++;
                scoreDisplay.textContent = score;
                
                feedbackDisplay.textContent = 'PERFEITO!';
                feedbackDisplay.style.color = '#00ffcc';
                
                // Feedback tátil visual
                targetRing.classList.remove('flash-hit');
                void targetRing.offsetWidth; // Trigger reflow
                targetRing.classList.add('flash-hit');

                screenFlash.classList.remove('perfect-flash');
                void screenFlash.offsetWidth;
                screenFlash.classList.add('perfect-flash');

                resetRing();
            } else if (accuracy <= 0.25) {
                // Acerto bom, mas não perfeito
                score++;
                scoreDisplay.textContent = score;

                feedbackDisplay.textContent = 'QUASE';
                feedbackDisplay.style.color = '#ffcc00';

                resetRing();
            } else {
                // Errou o tempo
                if (currentScale > 1.0) {
                    triggerGameOver('MUITO CEDO!');
                } else {
                    triggerGameOver('MUITO TARDE!');
                }
            }
        }

        function triggerGameOver(reason) {
            isPlaying = false;
            cancelAnimationFrame(animationId);
            
            targetRing.classList.add('flash-miss');
            setTimeout(() => targetRing.classList.remove('flash-miss'), 200);

            if (score > highScore) {
                highScore = score;
                localStorage.setItem('hyper_pulse_highscore', highScore);
                highScoreDisplay.textContent = `BEST: ${highScore}`;
            }

            // Atualiza tela de Game Over instantaneamente para reinício rápido
            menuTitle.textContent = 'GAME OVER';
            menuDesc.innerHTML = `<span style="color: #ff0055; font-weight: bold;">${reason}</span><br><br>Pontuação: ${score}<br>Melhor: ${highScore}`;
            startBtn.textContent = 'TENTAR DE NOVO';
            menu.style.display = 'flex';
        }

        // Inputs (Clique/Touch e Barra de Espaço)
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                if (isPlaying) handleAction();
                else initGame();
            }
        });

        document.getElementById('game-container').addEventListener('mousedown', (e) => {
            e.preventDefault();
            handleAction();
        });

        document.getElementById('game-container').addEventListener('touchstart', (e) => {
            e.preventDefault();
            handleAction();
        });

        startBtn.addEventListener('click', initGame);
    </script>
</body>
</html>
