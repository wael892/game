<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quiz Acadêmico Realtime</title>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body {
            background-color: #2a9d8f;
            display: flex; flex-direction: column; align-items: center;
            height: 100vh; height: -webkit-fill-available;
            padding: 6px; overscroll-behavior: none; overflow: hidden;
        }
        #login-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #2a9d8f; display: flex; justify-content: center;
            align-items: center; z-index: 1000;
        }
        .login-box {
            background: white; padding: 20px; border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2); width: 100%; max-width: 360px; text-align: center;
        }
        .login-box h2 { color: #264653; margin-bottom: 15px; font-size: 22px; }
        .login-box input {
            width: 100%; padding: 10px; margin-bottom: 12px;
            border: 2px solid #ced4da; border-radius: 6px; outline: none; font-size: 15px;
        }
        .login-box input:focus { border-color: #2a9d8f; }
        header {
            background: white; padding: 6px 12px; border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 1200px;
            display: flex; justify-content: space-between; align-items: center; gap: 8px; flex-shrink: 0;
        }
        h1 { color: #264653; font-size: 16px; flex-shrink: 0; }
        #word-display {
            font-weight: bold; font-size: 13px; color: #e76f51;
            background: #f8f9fa; padding: 4px 10px; border-radius: 6px;
            border: 2px dashed #e76f51; text-align: center; flex: 1;
        }
        #room-display {
            font-weight: bold; color: #666; font-size: 11px;
            display: flex; flex-direction: column; align-items: flex-end; flex-shrink: 0;
        }
        #timer-display { font-weight: bold; color: #e76f51; }
        #main-container {
            display: flex; width: 100%; max-width: 1200px; flex: 1; gap: 6px; overflow: hidden; margin-top: 6px;
        }
        #scoreboard {
            flex: 0 0 140px; background: white; border-radius: 8px; padding: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); display: flex; flex-direction: column; overflow: hidden;
        }
        #scoreboard h3 { color: #555; padding-bottom: 4px; border-bottom: 2px solid #f1f3f5; font-size: 12px; }
        #players-list { margin-top: 6px; overflow-y: auto; flex: 1; display: flex; flex-direction: column; gap: 4px; }
        .player-item {
            background: #f8f9fa; padding: 6px; border-radius: 4px;
            font-weight: bold; color: #333; font-size: 11px; border-left: 4px solid #2a9d8f;
            display: flex; justify-content: space-between; align-items: center;
        }
        .player-info { display: flex; flex-direction: column; overflow: hidden; }
        .player-rank { font-size: 9px; color: #777; }
        .player-name { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .player-score {
            background: #2a9d8f; color: white; border-radius: 8px;
            padding: 1px 6px; font-size: 10px; min-width: 28px; text-align: center; flex-shrink: 0;
        }
        .player-score.bump { transform: scale(1.3); background: #e76f51 !important; transition: transform 0.2s; }
        #quiz-container {
            flex: 1; background: white; border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); display: flex; flex-direction: column; overflow: hidden; padding: 12px; gap: 8px;
        }
        #question-card {
            flex: 1; background: #f8f9fa; border-radius: 8px; border: 2px solid #e9ecef;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            padding: 16px; text-align: center; position: relative;
        }
        #question-category {
            position: absolute; top: 8px; left: 8px; background: #264653; color: white;
            padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: bold; text-transform: uppercase;
        }
        #question-text { font-size: 16px; font-weight: bold; color: #264653; line-height: 1.4; max-width: 500px; }
        #bottom-actions { display: flex; gap: 4px; justify-content: center; flex-shrink: 0; }
        .btn { padding: 6px 12px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 11px; color: white; transition: background 0.2s; }
        .btn-action { background: #e76f51; }
        .btn-interact { background: #f4a261; }
        .btn-interact.cooldown { opacity: 0.4; cursor: not-allowed; }
        #right-chats-wrapper { flex: 0 0 220px; display: flex; flex-direction: column; gap: 6px; overflow: hidden; }
        .chat-box-container { flex: 1; background: white; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); display: flex; flex-direction: column; overflow: hidden; }
        .chat-title-bar { background: #264653; color: white; padding: 4px 8px; font-size: 10px; font-weight: bold; text-transform: uppercase; }
        .chat-messages-area { flex: 1; padding: 6px; overflow-y: auto; display: flex; flex-direction: column; gap: 3px; }
        .msg { padding: 4px 6px; border-radius: 4px; font-size: 11px; word-break: break-all; }
        .msg-system  { background: #e9ecef; color: #495057; font-weight: bold; }
        .msg-success { background: #d1e7dd; color: #0f5132; font-weight: bold; }
        .msg-wrong   { background: #ffe3e8; color: #c92a2a; }
        .msg-normal  { background: #f1f3f5; color: #333; }
        .msg-normal .username { font-weight: bold; color: #2a9d8f; }
        .chat-input-row { display: flex; padding: 4px; border-top: 1px solid #dee2e6; background: #f8f9fa; }
        .chat-input-field { flex: 1; padding: 4px; border: 1px solid #ced4da; border-radius: 4px; outline: none; font-size: 11px; }
        .chat-send-btn { background: #264653; color: white; margin-left: 4px; font-size: 11px; padding: 4px 8px; border: none; border-radius: 4px; cursor: pointer; }
        
        .coffee-fly, .paper-fly { position: fixed; font-size: 28px; pointer-events: none; z-index: 2000; animation: flyEffect 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards; }
        @keyframes flyEffect {
            0% { opacity: 1; transform: translate(0,0) scale(1); }
            100% { opacity: 0; transform: translate(var(--tx), var(--ty)) rotate(360deg) scale(0.5); }
        }

        @media (max-width: 768px) {
            body { padding: 4px; }
            header { height: auto; padding: 6px; flex-wrap: wrap; }
            h1 { font-size: 13px; }
            #word-display { font-size: 11px; order: 3; width: 100%; margin-top: 4px; }
            #main-container { flex-direction: column; position: static; top: 0; bottom: 0; left: 0; right: 0; }
            #scoreboard { flex: 0 0 40px; width: 100%; flex-direction: row; align-items: center; }
            #scoreboard h3 { display: none; }
            #players-list { flex-direction: row; margin-top: 0; height: 100%; align-items: center; overflow-x: auto; overflow-y: hidden; }
            .player-item { white-space: nowrap; height: 26px; }
            #right-chats-wrapper { flex: 0 0 160px; flex-direction: row; }
            .chat-box-container { flex: 1; }
            #quiz-container { flex: 1; min-height: 140px; }
            #question-text { font-size: 13px; }
        }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-box">
        <h2>🔬 Quiz Universitário *</h2>
        <input type="text" id="input-username" placeholder="Seu Nome / Apelido *" required>
        <input type="text" id="input-room" placeholder="Nome da Sala / Grupo *" required>
        <button class="btn" style="width:100%; padding:10px; font-size:14px; background:#2a9d8f;" onclick="connectToGame()">Entrar na Sala</button>
    </div>
</div>

<header>
    <h1>🔬 QUIZ</h1>
    <div id="word-display">Aguardando início da rodada acadêmica...</div>
    <div id="room-display">
        <span id="room-id">Sala: —</span>
        <span id="timer-display">⏱️ Tempo: --</span>
    </div>
</header>

<div id="main-container">
    <div id="scoreboard">
        <h3>🏆 Ranking</h3>
        <div id="players-list"></div>
    </div>

    <div id="quiz-container">
        <div id="question-card">
            <div id="question-category">Geral</div>
            <div id="question-text">Entre em uma sala para carregar os cartões de estudo interativos.</div>
        </div>
        <div id="bottom-actions">
            <button id="btn-skip" class="btn btn-action" onclick="skipQuestion()">⏭️ Pular Pergunta</button>
            <button id="btn-coffee" class="btn btn-interact" onclick="throwInteract('coffee')">☕ Jogar Café</button>
            <button id="btn-paper" class="btn btn-interact" onclick="throwInteract('paper')">📄 Pedir Cópia</button>
        </div>
    </div>

    <div id="right-chats-wrapper">
        <div class="chat-box-container">
            <div class="chat-title-bar">🎯 Palpites da Matéria</div>
            <div id="guess-messages" class="chat-messages-area"></div>
            <div class="chat-input-row">
                <input type="text" id="guess-input" class="chat-input-field" placeholder="Sua resposta... *" autocomplete="off">
                <button class="chat-send-btn" onclick="sendGuess()">➤</button>
            </div>
        </div>
        <div class="chat-box-container">
            <div class="chat-title-bar">💬 Conversa de Corredor</div>
            <div id="chat-messages" class="chat-messages-area"></div>
            <div class="chat-input-row">
                <input type="text" id="chat-input" class="chat-input-field" placeholder="Conversar... *" autocomplete="off">
                <button class="chat-send-btn" onclick="sendChat()">➤</button>
            </div>
        </div>
    </div>
</div>

<script>
    const BANCO_PERGUNTAS = [
        { c: "Epidemiologia", q: "Qual o termo para o número de casos novos de uma doença em uma população em um período?", a: "incidencia" },
        { c: "Epidemiologia", q: "Como é chamada a descrição do curso de uma doença sem intervenção médica?", a: "historia natural" },
        { c: "Prevenção", q: "A vacinação faz parte de qual nível de prevenção?", a: "primaria" },
        { c: "Prevenção", q: "O diagnóstico precoce e o rastreamento clínico pertencem a qual nível de prevenção?", a: "secundaria" },
        { c: "Saúde Pública", q: "Qual a sigla do sistema de saúde unificado instituído pela Constituição de 1988?", a: "sus" },
        { c: "SUS", q: "Qual princípio do SUS garante que todos os cidadãos têm direito ao acesso sem discriminação?", a: "universalidade" },
        { c: "SUS", q: "Qual diretriz do SUS transfere as responsabilidades de gestão para os municípios?", a: "descentralizacao" },
        { c: "Biossegurança", q: "Qual a sigla para os equipamentos de proteção individual como luvas e jalecos?", a: "epi" },
        { c: "Biomedicina", q: "Qual nível de biossegurança (NB) é exigido para agentes de alto risco individual e comunitário?", a: "nb4" }
    ];

    let username = "", roomName = "", mqttClient = null, baseTopic = "";
    const listaJogadores = new Set();
    const scores = {};
    let currentQuestion = null, roundActive = false, countdownInterval = null, currentTimeLeft = 0;
    const TEMPO_RODADA = 30;

    function connectToGame() {
        username = document.getElementById('input-username').value.trim();
        roomName = document.getElementById('input-room').value.trim().toLowerCase().replace(/[^a-z0-9]/g,"");
        if (!username || !roomName) return;
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('room-id').innerText = "Sala: " + roomName;
        adicionarJogador(username);
        initMqtt();
    }

    function initMqtt() {
        baseTopic = "academic_quiz_engine_2026/" + roomName;
        mqttClient = mqtt.connect('wss://broker.hivemq.com:8884/mqtt');
        mqttClient.on('connect', () => {
            mqttClient.subscribe(baseTopic + "/chat");
            mqttClient.subscribe(baseTopic + "/presence");
            mqttClient.subscribe(baseTopic + "/presence/echo");
            mqttClient.subscribe(baseTopic + "/flow");
            mqttClient.subscribe(baseTopic + "/interact");

            let connectMsg = JSON.stringify({ sender: "Sistema", text: `📢 ${username} entrou na sala de estudos.`, name: username, type: "sys" });
            mqttClient.publish(baseTopic + "/chat", connectMsg);
            mqttClient.publish(baseTopic + "/presence", connectMsg);
            setTimeout(() => { checkAutoStart(); }, 1500);
        });

        mqttClient.on('message', (topic, msg) => {
            const data = JSON.parse(msg.toString());
            if (topic === baseTopic + "/chat") {
                if (data.type === "sys") {
                    addMsg('guess-messages', 'msg-system', data.text);
                    if (data.name) { adicionarJogador(data.name); checkAutoStart(); }
                } else if (data.type === "guess") {
                    if (data.isCorrect) {
                        addMsg('guess-messages', 'msg-success', `🎯 ${data.sender} acertou a resposta!`);
                        addScore(data.sender, data.pts);
                        nextRound();
                    } else {
                        addMsg('guess-messages', 'msg-wrong', `${data.sender}: ${data.text}`);
                    }
                } else if (data.type === "talk") {
                    addChatMsg(data.sender, data.text);
                }
            } else if (topic === baseTopic + "/presence" && data.name !== username) {
                adicionarJogador(data.name);
                mqttClient.publish(baseTopic + "/presence/echo", JSON.stringify({ name: username }));
                checkAutoStart();
            } else if (topic === baseTopic + "/presence/echo" && data.name !== username) {
                adicionarJogador(data.name);
                checkAutoStart();
            } else if (topic === baseTopic + "/flow") {
                handleFlow(data);
            } else if (topic === baseTopic + "/interact") {
                triggerVisualEffect(data.type);
            }
        });
    }

    function checkAutoStart() {
        if (!roundActive && listaJogadores.size > 0) {
            if (Array.from(listaJogadores)[0] === username) { triggerNewQuestion(); }
        }
    }

    function triggerNewQuestion() {
        const index = Math.floor(Math.random() * BANCO_PERGUNTAS.length);
        mqttClient.publish(baseTopic + "/flow", JSON.stringify({ index }));
    }

    function handleFlow(data) {
        clearInterval(countdownInterval);
        currentQuestion = BANCO_PERGUNTAS[data.index];
        roundActive = true;
        document.getElementById('question-category').innerText = currentQuestion.c;
        document.getElementById('question-text').innerText = currentQuestion.q;
        document.getElementById('word-display').innerText = "💡 Pergunta liberada! Valendo pontuação de velocidade.";
        startTimer(TEMPO_RODADA);
    }

    function startTimer(secs) {
        currentTimeLeft = secs;
        document.getElementById('timer-display').innerText = "⏱️ Tempo: " + currentTimeLeft + "s";
        countdownInterval = setInterval(() => {
            currentTimeLeft--;
            if (currentTimeLeft <= 0) {
                clearInterval(countdownInterval);
                addMsg('guess-messages', 'msg-system', `🛑 Tempo esgotado! A resposta era: ${currentQuestion.a.toUpperCase()}`);
                nextRound();
            } else {
                document.getElementById('timer-display').innerText = "⏱️ Tempo: " + currentTimeLeft + "s";
            }
        }, 1000);
    }

    function nextRound() {
        roundActive = false;
        clearInterval(countdownInterval);
        if (Array.from(listaJogadores)[0] === username) {
            setTimeout(() => { triggerNewQuestion(); }, 3000);
        }
    }

    function sendGuess() {
        const input = document.getElementById('guess-input');
        const text = input.value.trim();
        if (!text || !roundActive) { input.value = ""; return; }
        const cleanGuess = text.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
        if (cleanGuess.includes(currentQuestion.a)) {
            let pts = Math.max(10, currentTimeLeft * 10);
            mqttClient.publish(baseTopic + "/chat", JSON.stringify({ sender: username, text, isCorrect: true, pts, type: "guess" }));
        } else {
            mqttClient.publish(baseTopic + "/chat", JSON.stringify({ sender: username, text, isCorrect: false, type: "guess" }));
        }
        input.value = "";
    }

    function sendChat() {
        const input = document.getElementById('chat-input');
        const text = input.value.trim();
        if (!text) return;
        mqttClient.publish(baseTopic + "/chat", JSON.stringify({ sender: username, text, type: "talk" }));
        input.value = "";
    }

    function skipQuestion() {
        if (roundActive) nextRound();
    }

    function throwInteract(type) {
        mqttClient.publish(baseTopic + "/interact", JSON.stringify({ type }));
    }

    function triggerVisualEffect(type) {
        const el = document.createElement('div');
        el.className = type === 'coffee' ? 'coffee-fly' : 'paper-fly';
        el.textContent = type === 'coffee' ? '☕' : '📄';
        el.style.left = Math.random() * (window.innerWidth - 40) + 'px';
        el.style.top = Math.random() * (window.innerHeight - 40) + 'px';
        el.style.setProperty('--tx', (Math.random() * 200 - 100) + 'px');
        el.style.setProperty('--ty', (Math.random() * 200 - 100) + 'px');
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 800);
    }

    function adicionarJogador(nome) {
        if (listaJogadores.has(nome)) return;
        listaJogadores.add(nome);
        scores[nome] = 0;
        renderScoreboard();
    }

    function addScore(nome, pts) {
        if (!scores[nome]) scores[nome] = 0;
        scores[nome] += pts;
        renderScoreboard();
        const item = document.getElementById("p-" + nome.replace(/\s+/g,'-'));
        if (item) {
            const sc = item.querySelector('.player-score');
            sc.classList.add('bump'); setTimeout(() => sc.classList.remove('bump'), 400);
        }
    }

    function renderScoreboard() {
        const container = document.getElementById('players-list');
        container.innerHTML = "";
        const sorted = Array.from(listaJogadores).sort((a,b) => scores[b] - scores[a]);
        sorted.forEach((nome, idx) => {
            const item = document.createElement('div');
            item.className = "player-item";
            item.id = "p-" + nome.replace(/\s+/g,'-');
            item.innerHTML = `<div class="player-info"><span class="player-rank">${idx+1}º</span><span class="player-name">${nome}</span></div><span class="player-score">${scores[nome]}</span>`;
            container.appendChild(item);
        });
    }

    function addMsg(targetId, className, text) {
        const c = document.getElementById(targetId);
        const m = document.createElement('div'); m.className = `msg ${className}`; m.innerText = text;
        c.appendChild(m); c.scrollTop = c.scrollHeight;
    }

    function addChatMsg(sender, text) {
        const c = document.getElementById('chat-messages');
        const m = document.createElement('div'); m.className = "msg msg-normal";
        m.innerHTML = `<span class="username">${sender}: </span>${text}`;
        c.appendChild(m); c.scrollTop = c.scrollHeight;
    }

    document.getElementById('guess-input').addEventListener('keypress', (e) => { if (e.key === 'Enter') sendGuess(); });
    document.getElementById('chat-input').addEventListener('keypress', (e) => { if (e.key === 'Enter') sendChat(); });
</script>
</body>
</html>
